<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Project Piston v13</title><style>body{margin:0;background:#eef0f3;color:#111827;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif}.wrap{max-width:1240px;margin:auto;padding:18px}.hero{background:#111827;color:#fff;border-radius:28px;padding:26px;box-shadow:0 16px 40px #0002}.hero p{color:#d1d5db}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:20px;padding:16px;box-shadow:0 8px 24px #0001;margin:14px 0}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0}.tab{border:0;background:#fff;border-radius:999px;padding:10px 14px;box-shadow:0 4px 14px #0001}.active{background:#111827!important;color:#fff}.hidden{display:none}.muted{color:#6b7280}.stat{font-size:34px;font-weight:800}select,textarea{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:12px;font:inherit}.pill{display:inline-block;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:12px;padding:4px 8px;margin:2px}.warn{background:#fff7ed;color:#9a3412}.ok{background:#dcfce7;color:#166534}.danger{background:#fee2e2;color:#991b1b}.progress{height:12px;background:#e5e7eb;border-radius:999px;overflow:hidden}.progress span{display:block;height:100%;background:#111827}.notice{background:#fff7ed;border:1px solid #fed7aa;border-radius:14px;padding:12px;color:#9a3412}.part,.panel{border:1px solid #e5e7eb;border-radius:16px;padding:12px;background:#fff}button{cursor:pointer;border:1px solid #d1d5db;background:#fff;border-radius:12px;padding:9px 12px}.primary{background:#111827;color:#fff}.stage-card{border:1px solid #d6dbe3;border-radius:22px;padding:16px;margin:16px 0;background:#fff;box-shadow:0 10px 28px #0000000d}.stage-layout{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:16px;align-items:start}.instruction-box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:16px;padding:14px}.evidence-box{background:#f8fafc;border:1px solid #dbeafe;border-radius:16px;padding:14px;position:sticky;top:12px}.stage-title{display:flex;align-items:center;justify-content:space-between;gap:10px}.small{font-size:13px}.voice{background:#111827;color:#fff;border-radius:20px;padding:16px}.timeline{display:flex;gap:10px;overflow:auto;padding:8px 0}.dot{min-width:160px;border:1px solid #e5e7eb;background:#fff;border-radius:16px;padding:10px}.dot.done{border-color:#86efac;background:#f0fdf4}.dot.current{border-color:#fde68a;background:#fffbeb}.side-panels{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin:14px 0}.job{border-bottom:1px solid #eee;padding:14px 0}.instruction-list{padding-left:20px}.returnbar{background:#ecfeff;border:1px solid #a5f3fc;color:#155e75;border-radius:16px;padding:12px;margin:12px 0}.wy-btn{display:block;width:100%;text-align:left;margin:8px 0;padding:10px;border-radius:12px}.table{width:100%;border-collapse:collapse}.table td,.table th{border-bottom:1px solid #eee;text-align:left;padding:9px}.kb{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}@media(max-width:900px){.stage-layout{grid-template-columns:1fr}.evidence-box{position:static}}</style></head><body><div class='wrap'><section class='hero'><h1>Project Piston</h1><p>v13: first gold-standard content pass for the Timing Chain Replacement module and internal knowledge base structure.</p></section><div class='grid'><div class='card'><div class='muted'>Vehicle</div><select id='veh'></select><p id='vehInfo' class='muted'></p></div><div class='card'><div class='muted'>Job module</div><select id='mod'></select><p id='modInfo' class='muted'></p></div><div class='card'><div class='muted'>Progress</div><div class='stat' id='pct'>0%</div><div class='progress'><span id='bar'></span></div></div></div><nav class='tabs'><button class='tab active' data-t='home'>Dashboard</button><button class='tab' data-t='garage'>Garage Mode</button><button class='tab' data-t='module'>Module Content</button><button class='tab' data-t='kb'>Knowledge Base</button><button class='tab' data-t='validate'>Workshop Validation</button><button class='tab' data-t='passport'>Vehicle Passport</button></nav><main id='home' class='card'></main><main id='garage' class='card hidden'></main><main id='module' class='card hidden'></main><main id='kb' class='card hidden'></main><main id='validate' class='card hidden'></main><main id='passport' class='card hidden'></main></div><script>const vehicles=[['r50-one','R50 MINI One','Hatchback','W10','Naturally aspirated',0],['r50-cooper','R50 MINI Cooper','Hatchback','W10','Naturally aspirated',0],['r52-cooper','R52 MINI Cooper Convertible','Convertible','W10','Naturally aspirated',0],['r52-cooper-s','R52 MINI Cooper S Convertible','Convertible','W11','Eaton M45 supercharged',1],['r53-cooper-s','R53 MINI Cooper S Hatchback','Hatchback','W11','Eaton M45 supercharged',1]];const mods=[['timing','Timing Chain Replacement','Engine / Timing',0],['sump','Sump & Oil Pickup Clean','Lubrication',0],['supercharger','Supercharger Oil Service','Supercharger / Cooling',1],['waterpump','Water Pump Replacement','Cooling',0],['thermostat','Thermostat Replacement','Cooling',0],['auxbelt','Auxiliary Belt Replacement','Drive Belt',0],['crankseal','Front Crank Seal Replacement','Engine Sealing',0]];const timingContent={overview:'Replacement of timing chain, guides and hydraulic tensioner on W10/W11 first-generation MINI engines. The module treats oil pickup contamination as a linked risk where guide material has broken up.',compatibility:['R50 MINI One / Cooper: W10 naturally aspirated','R52 MINI Cooper: W10 naturally aspirated','R52 MINI Cooper S: W11 Eaton M45 supercharged','R53 MINI Cooper S: W11 Eaton M45 supercharged'],symptoms:['Cold start chain rattle','Rattle from timing end','Poor idle or running if timing correlation is affected','Cam/crank correlation faults where present','Plastic guide debris in oil/filter/sump','Oil pressure warning risk where pickup is restricted by debris'],diagnosis:['Confirm noise location before stripping.','Check service history and whether tensioner/guides have been replaced.','Inspect drained oil and oil filter for plastic debris.','If guide pieces are missing, treat sump/oil pickup inspection as strongly recommended.'],tools:['Camshaft locking tool','Crankshaft locking tool','Crank pulley puller/holding method','Torque wrench','E-torx/Torx socket set','Seal pick/installer','Drain pan','Inspection light','Bags/labels for fixings'],parts:['Timing chain','Chain guides','Hydraulic tensioner','Camshaft seals where disturbed','Front crankshaft seal recommended if pulley removed','Valve cover gasket','Engine oil','Oil filter'],consumables:['Brake cleaner','Clean rags','Assembly lube where appropriate','Thread locker only where specified','Coolant top-up if cooling system disturbed'],common:['Using paint marks instead of locking tools','Not checking for guide debris in the sump/oil pickup','Letting radiator pack hang from hoses in service mode','Reusing obviously hardened seals','Forgetting belt routing or connector positions','Failing to do a post-repair leak check and follow-up oil/filter change'],troubleshooting:['Renewed rattle: stop and recheck tensioner/timing procedure.','Oil light: do not assume sensor fault; check oil level, pickup contamination and idle behaviour.','Poor running: scan for cam/crank correlation and vacuum/EVAP faults.','Leaks: inspect crank seal, valve cover, timing cover and sump joint.']};const stages=[{id:'prep',name:'Prepare tools and workspace',evidence:[],instructions:['Confirm exact model/engine: W10 or W11.','Confirm locking tools, timing kit, oil/filter and seals are available.','Photograph parts laid out only if desired; not required for evidence.'],torque:'No torque values required.',why:'Prevents the job stopping halfway through strip-down.'},{id:'access',name:'Gain access / service mode',evidence:['before','after'],instructions:['Photograph front/timing-end area before dismantling.','Remove bumper/front end as required for access.','Support radiator pack; do not allow coolant or AC lines to carry weight.','Record belt routing and fastener locations.'],torque:'Front-end fastener torque verification required.',why:'Creates room and provides the repair before-reference.'},{id:'belt',name:'Remove auxiliary belt and crank pulley',evidence:['linked-before','after'],instructions:['Record belt path before removal.','Release belt tension safely.','Inspect belt, tensioner and idlers.','Remove crank pulley using correct holding/puller method.','Inspect damper rubber and crank seal area.'],torque:'Crank pulley and related fastener data verification required.',why:'Pulley removal creates access and exposes the front crank seal opportunity.'},{id:'lock',name:'Lock crankshaft and camshaft',evidence:['after'],instructions:['Rotate engine only as specified.','Fit crank and cam locking tools fully.','Do not proceed if tools do not seat correctly.','Do not rely on paint marks alone.'],torque:'No final torque at locking stage.',why:'Protects engine timing before chain removal.'},{id:'remove',name:'Remove old chain, guides and tensioner',evidence:['during','extra'],instructions:['Remove tensioner and guide hardware methodically.','Capture a during photo of exposed chain/guides.','Use Add picture for broken guide pieces, missing plastic, abnormal wear or debris.','Keep removed parts for comparison.'],torque:'Guide/tensioner torque values verification required.',why:'The during evidence proves condition and explains why the repair was needed.'},{id:'inspect',name:'Inspect sump contamination risk',evidence:['during','extra'],instructions:['Inspect oil filter and drained oil for plastic debris.','If guide fragments are missing, open linked Sump & Oil Pickup Clean.','Record any pickup blockage or debris found.'],torque:'Sump/pickup data held in linked module; verification required.',why:'A blocked pickup can turn timing guide failure into oil pressure failure.'},{id:'install',name:'Install new chain, guides and tensioner',evidence:['after'],instructions:['Clean guide mounting surfaces.','Install guides/chain maintaining locked timing position.','Fit/prime tensioner according to verified procedure.','Rotate/check only when procedure allows.'],torque:'Critical torque values verification required before release.',why:'Correct timing installation is the safety-critical core of the job.'},{id:'reassemble',name:'Reassemble, refill and first start',evidence:['after'],instructions:['Replace accessible seals where selected.','Reassemble timing area, belt drive and access parts.','Refill oil and fit new filter.','Start and listen for abnormal rattle.','Check leaks and warning lights.'],torque:'All disturbed fixings require verified torque values.',why:'Final assembly and first start confirm the repair is safe to test.'},{id:'roadtest',name:'Road test and follow-up',evidence:[],instructions:['Road test gently first.','Recheck leaks, oil level and coolant if disturbed.','Schedule second oil/filter change if debris was present.','Record technician notes in Vehicle Passport.'],torque:'No torque values required.',why:'Confirms the repair works in real conditions.'}];const kbItems=[['KB-TIM-001','Timing chain kit','W10/W11 chain, guides and tensioner','🟡 Awaiting cross-check'],['KB-TIM-002','Cam/crank locking tools','Required for safe timing work','🟡 Awaiting cross-check'],['KB-TIM-003','Crank pulley torque','Critical data not entered yet','🔴 Research required'],['KB-TIM-004','Guide/tensioner torque','Critical data not entered yet','🔴 Research required'],['KB-TIM-005','Oil pickup risk','Guide debris can restrict pickup','🟡 Workshop confirmation'],['KB-TIM-006','Follow-up oil/filter','Recommended after debris contamination','🟡 Workshop confirmation'],['KB-TIM-007','R52 Cooper S applicability','R52 Cooper S uses W11 supercharged engine','🟢 User confirmed']];const validation=['Confirm the most practical access method: full service mode vs partial front-end movement.','Confirm whether radiator pack removal is usually necessary or avoidable.','Identify the awkward fixings/steps that should get extra warnings.','Confirm realistic DIY and professional labour times.','Confirm which seals are genuinely worth doing every time.','Confirm when sump removal becomes mandatory vs recommended.','Confirm your preferred wording for oil pickup blockage after guide failure.','Provide/approve real photos later: access before/after, chain exposed, debris/pickup, new chain installed, reassembled.'];const wy=[['sump','Sump clean','Critical after timing guide failure'],['crankseal','Front crank seal','Cheap while pulley is removed'],['auxbelt','Auxiliary belt','Low extra labour while accessible'],['waterpump','Water pump','Strong W11/front-end access overlap'],['thermostat','Thermostat','Useful if cooling system is open']];let st=JSON.parse(localStorage.projectPistonV13||localStorage.projectPistonV12||'{}');st.v=st.v||'r52-cooper-s';st.m=st.m||'timing';st.done=st.done||{};st.pass=st.pass||[];st.current=st.current||0;veh.innerHTML=vehicles.map(v=>`<option value='${v[0]}'>${v[1]} · ${v[2]} · ${v[3]} · ${v[4]}</option>`).join('');function V(){return vehicles.find(v=>v[0]==st.v)||vehicles[3]}function A(){return mods.filter(m=>!m[3]||V()[5])}function M(){return A().find(m=>m[0]==st.m)||A()[0]}function save(){localStorage.projectPistonV13=JSON.stringify(st);render()}veh.onchange=()=>{st.v=veh.value;save()};mod.onchange=()=>{st.m=mod.value;st.current=0;save()};function k(i){return st.m+'-'+i}function done(){return stages.filter((_,i)=>st.done[k(i)]).length}function list(a){return '<ul class="instruction-list">'+a.map(x=>`<li>${x}</li>`).join('')+'</ul>'}function mark(i){st.done[k(i)]=!st.done[k(i)];if(st.done[k(i)])st.pass.push({d:new Date().toLocaleDateString(),job:M()[1],step:stages[i].name,type:'Step completed',car:V()[1]});save()}function nextStage(){st.current=Math.min(stages.length-1,st.current+1);save()}function prevStage(){st.current=Math.max(0,st.current-1);save()}function timeline(){return `<div class='timeline'>${stages.map((s,i)=>`<div class='dot ${st.done[k(i)]?'done':''} ${i==st.current?'current':''}' onclick='st.current=${i};save()'><b>${i+1}. ${s.name.split('/')[0]}</b><p class='small muted'>${st.done[k(i)]?'Complete':(i==st.current?'Current':'Pending')}</p></div>`).join('')}</div>`}function stageCard(s,i){return `<section class='stage-card'><div class='stage-title'><div><h3>${i+1}. ${s.name}</h3><p class='muted'>${s.why}</p></div><span class='pill ${i==st.current?'warn':'ok'}'>${i==st.current?'Current':'Stage'}</span></div><div class='stage-layout'><div class='instruction-box'><h4>Instructions</h4>${list(s.instructions)}<h4>Evidence requirement</h4><p>${s.evidence.length?s.evidence.join(' + '):'No photo evidence required'}</p><textarea placeholder='Technician notes, faults found, variant differences, follow-up reminders...'></textarea></div><aside class='evidence-box'><h4>Torque / spec status</h4><p class='small muted'>${s.torque}</p><hr><button onclick="mark(${i})">${st.done[k(i)]?'Mark stage undone':'Mark stage done'}</button></aside></div></section>`}function render(){veh.value=st.v;vehInfo.textContent=`${V()[2]} · ${V()[3]} · ${V()[4]}`;mod.innerHTML=A().map(m=>`<option value='${m[0]}'>${m[1]}</option>`).join('');mod.value=st.m;modInfo.textContent=M()[2];let p=Math.round(done()/stages.length*100);pct.textContent=p+'%';bar.style.width=p+'%';home.innerHTML=`<h2>Project Dashboard</h2><div class='grid'><div><h3>${V()[1]}</h3><p>${V()[3]} · ${V()[4]}</p></div><div><h3>${M()[1]}</h3><p>${done()} of ${stages.length} timing stages complete.</p></div><div><h3>Content status</h3><p>Timing Chain v0.1 content draft created. Torque/specs held for verification.</p></div></div><div class='notice'>First gold-standard module content pass started. External torque values were not imported because they have not been verified yet.</div>`;garage.innerHTML=`<h2>Garage Mode</h2>${timeline()}<p><button onclick='prevStage()'>Back</button> <button class='primary' onclick='nextStage()'>Next</button></p>${stageCard(stages[st.current],st.current)}<div class='side-panels'><div class='panel'><h3>Whilst You’re There</h3>${wy.map(w=>`<div class='job'><b>${w[1]}</b><p class='muted'>${w[2]}</p></div>`).join('')}</div><div class='panel'><h3>Voice Script Seed</h3><p>“${stages[st.current].name}. ${stages[st.current].instructions[0]} Say next when ready.”</p></div></div>`;module.innerHTML=`<h2>Timing Chain Replacement v0.1</h2><h3>Overview</h3><p>${timingContent.overview}</p><div class='kb'><div class='panel'><h3>Compatibility</h3>${list(timingContent.compatibility)}</div><div class='panel'><h3>Symptoms</h3>${list(timingContent.symptoms)}</div><div class='panel'><h3>Diagnosis</h3>${list(timingContent.diagnosis)}</div><div class='panel'><h3>Tools</h3>${list(timingContent.tools)}</div><div class='panel'><h3>Parts</h3>${list(timingContent.parts)}</div><div class='panel'><h3>Consumables</h3>${list(timingContent.consumables)}</div><div class='panel'><h3>Common mistakes</h3>${list(timingContent.common)}</div><div class='panel'><h3>Troubleshooting</h3>${list(timingContent.troubleshooting)}</div></div>`;kb.innerHTML=`<h2>Internal Knowledge Base</h2><table class='table'><tr><th>ID</th><th>Object</th><th>Note</th><th>Status</th></tr>${kbItems.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</table><p class='notice'>Only green items are release-ready. Amber and red remain internal until verified.</p>`;validate.innerHTML=`<h2>Workshop Validation Needed From Steven</h2>${list(validation)}<p class='muted'>This list is intentionally practical rather than asking you to check every technical line.</p>`;passport.innerHTML=`<h2>Vehicle Passport</h2>${st.pass.length?st.pass.slice().reverse().map(p=>`<div class='job'><b>${p.step}</b><p class='muted'>${p.d} · ${p.type} · ${p.job} · ${p.car}</p></div>`).join(''):'<p>No entries yet.</p>'}`}document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');['home','garage','module','kb','validate','passport'].forEach(id=>document.getElementById(id).classList.add('hidden'));document.getElementById(b.dataset.t).classList.remove('hidden')});render();</script></body></html>
