<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Project Piston v13</title><style>body{margin:0;background:#eef0f3;color:#111827;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif}.wrap{max-width:1240px;margin:auto;padding:18px}.hero{background:#111827;color:#fff;border-radius:28px;padding:26px;box-shadow:0 16px 40px #0002}.hero p{color:#d1d5db}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:20px;padding:16px;box-shadow:0 8px 24px #0001;margin:14px 0}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0}.tab{border:0;background:#fff;border-radius:999px;padding:10px 14px;box-shadow:0 4px 14px #0001}.active{background:#111827!important;color:#fff}.hidden{display:none}.muted{color:#6b7280}.stat{font-size:34px;font-weight:800}select,textarea{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:12px;font:inherit}.pill{display:inline-block;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:12px;padding:4px 8px;margin:2px}.warn{background:#fff7ed;color:#9a3412}.ok{background:#dcfce7;color:#166534}.danger{background:#fee2e2;color:#991b1b}.progress{height:12px;background:#e5e7eb;border-radius:999px;overflow:hidden}.progress span{display:block;height:100%;background:#111827}.notice{background:#fff7ed;border:1px solid #fed7aa;border-radius:14px;padding:12px;color:#9a3412}.three{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.part,.panel{border:1px solid #e5e7eb;border-radius:16px;padding:12px;background:#fff}button{cursor:pointer;border:1px solid #d1d5db;background:#fff;border-radius:12px;padding:9px 12px}.primary{background:#111827;color:#fff}.linked{background:#ecfdf5;border:1px solid #bbf7d0;color:#166534}.stage-card{border:1px solid #d6dbe3;border-radius:22px;padding:16px;margin:16px 0;background:#fff;box-shadow:0 10px 28px #0000000d}.stage-layout{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:16px;align-items:start}.instruction-box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:16px;padding:14px}.evidence-box{background:#f8fafc;border:1px solid #dbeafe;border-radius:16px;padding:14px;position:sticky;top:12px}.stage-title{display:flex;align-items:center;justify-content:space-between;gap:10px}.evidence-actions{display:grid;grid-template-columns:1fr;gap:8px}.small{font-size:13px}.voice{background:#111827;color:#fff;border-radius:20px;padding:16px}.voice .cmd{display:inline-block;background:#1f2937;color:#fff;border:1px solid #374151;border-radius:999px;padding:7px 10px;margin:4px}.timeline{display:flex;gap:10px;overflow:auto;padding:8px 0}.dot{min-width:160px;border:1px solid #e5e7eb;background:#fff;border-radius:16px;padding:10px}.dot.done{border-color:#86efac;background:#f0fdf4}.dot.current{border-color:#fde68a;background:#fffbeb}.side-panels{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin:14px 0}.job{border-bottom:1px solid #eee;padding:14px 0}.instruction-list{padding-left:20px}.returnbar{background:#ecfeff;border:1px solid #a5f3fc;color:#155e75;border-radius:16px;padding:12px;margin:12px 0}.wy-btn,.tool-btn{display:block;width:100%;text-align:left;margin:8px 0;padding:10px;border-radius:12px}.tool-owned{background:#f0fdf4;border-color:#86efac}.tool-missing{background:#fff7ed;border-color:#fed7aa}.kb{font-size:13px;border-left:4px solid #111827;padding-left:10px;margin:8px 0}@media(max-width:900px){.three,.stage-layout{grid-template-columns:1fr}.evidence-box{position:static}}</style></head><body><div class='wrap'><section class='hero'><h1>Project Piston</h1><p>Sprint 3: Annual Service, Auxiliary Belt, Workshop Builder and Knowledge Base expansion.</p></section><div class='grid'><div class='card'><div class='muted'>Vehicle</div><select id='veh'></select><p id='vehInfo' class='muted'></p></div><div class='card'><div class='muted'>Job module</div><select id='mod'></select><p id='modInfo' class='muted'></p></div><div class='card'><div class='muted'>Progress</div><div class='stat' id='pct'>0%</div><div class='progress'><span id='bar'></span></div></div></div><nav class='tabs'><button class='tab active' data-t='home'>Dashboard</button><button class='tab' data-t='garage'>Garage Mode</button><button class='tab' data-t='tools'>Workshop Builder</button><button class='tab' data-t='kb'>Knowledge Base</button><button class='tab' data-t='voice'>Workshop Voice</button><button class='tab' data-t='evidence'>Evidence</button><button class='tab' data-t='parts'>Parts</button><button class='tab' data-t='feedback'>Suggest Update</button><button class='tab' data-t='passport'>Vehicle Passport</button></nav><main id='home' class='card'></main><main id='garage' class='card hidden'></main><main id='tools' class='card hidden'></main><main id='kb' class='card hidden'></main><main id='voice' class='card hidden'></main><main id='evidence' class='card hidden'></main><main id='parts' class='card hidden'></main><main id='feedback' class='card hidden'></main><main id='passport' class='card hidden'></main></div><script>const vehicles=[['r50-one','R50 MINI One','Hatchback','W10','Naturally aspirated',0],['r50-cooper','R50 MINI Cooper','Hatchback','W10','Naturally aspirated',0],['r52-cooper','R52 MINI Cooper Convertible','Convertible','W10','Naturally aspirated',0],['r52-cooper-s','R52 MINI Cooper S Convertible','Convertible','W11','Eaton M45 supercharged',1],['r53-cooper-s','R53 MINI Cooper S Hatchback','Hatchback','W11','Eaton M45 supercharged',1]];const mods={standard:{title:'Annual Service',sys:'Service / Maintenance',sc:0,tools:['jack','stands','oilSocket','torque','plugSocket','lamp'],jobPack:['Engine oil','Oil filter','Air filter','Cabin filter','Spark plugs if due','Drain plug seal if required'],access:['Raise vehicle for oil drain and underside inspection','No service mode required','No engine support required'],stages:['Warm engine and prepare service area','Drain engine oil','Replace oil filter','Inspect underside and leaks','Replace air filter and cabin filter','Replace spark plugs if due','Refill oil and check level','Start, leak check and road test'],wy:[['auxbelt','Auxiliary belt inspection','Inspection only during annual service'],['brakefluid','Brake fluid test','Safety-related age/condition check']]},auxbelt:{title:'Auxiliary Belt Replacement',sys:'Drive Belt',sc:0,tools:['beltTool','lamp','torque'],jobPack:['Auxiliary/serpentine belt','Optional tensioner/idler if worn'],access:['Right-hand wheel arch liner access may help','MINI serpentine belt tool strongly recommended','No full service mode required'],stages:['Identify belt route','Gain belt/tensioner access','Use serpentine belt tool to release tension','Remove belt','Inspect tensioner, idlers and crank pulley','Fit new belt and confirm routing','Start engine and observe belt tracking'],wy:[['crankseal','Front crank seal','Inspect if pulley area visible'],['waterpump','Water pump','Belt off helps inspection but not always replacement']]},timing:{title:'Timing Chain Replacement',sys:'Engine / Timing',sc:0,tools:['beltTool','engineSupport','timingKit','torque','puller','lamp'],jobPack:['Timing chain kit','Hydraulic tensioner','Engine oil','Oil filter','Cam cover gasket','Front crank seal recommended'],access:['Right front wheel and arch liner removal required','Engine support required','Right engine mount removal required','Serpentine belt removal required','Oil drain and oil filter replacement required'],stages:['Prepare tools and workspace','Gain access and remove arch liner','Support engine and remove right engine mount','Remove serpentine belt and crank pulley','Lock timing','Replace timing chain/guides/tensioner','Inspect related components','Reassemble and refill oil','Road test and final check'],wy:[['sump','Sump & oil pickup clean','Conditional: guide damage, hot idle oil light or unknown history'],['crankseal','Front crank seal','Excellent overlap while pulley is off'],['auxbelt','Auxiliary belt','Low extra labour while removed']]},sump:{title:'Sump & Oil Pickup Clean',sys:'Lubrication',sc:0,tools:['jack','stands','torque','lamp'],jobPack:['Engine oil','Oil filter','Sump sealant/gasket where applicable','Brake cleaner'],access:['Vehicle raised safely','Oil drained','Undertray/obstructions removed'],stages:['Prepare oil service area','Drain oil','Remove sump','Inspect sump debris','Clean oil pickup','Refit sump','Refill oil and leak check'],wy:[['timing','Timing chain inspection','Guide debris points back to timing system']]},waterpump:{title:'Water Pump Replacement',sys:'Cooling',sc:0,tools:['beltTool','torque','lamp'],jobPack:['Water pump','Gasket/seal','Coolant'],access:['Coolant drain required','Auxiliary belt removed','Access varies by engine'],stages:['Prepare cooling system','Drain coolant','Gain access','Remove water pump','Inspect related components','Fit pump','Bleed and heat cycle'],wy:[['thermostat','Thermostat','Cooling system already open'],['auxbelt','Auxiliary belt','Inspect/replace if worn']]},thermostat:{title:'Thermostat Replacement',sys:'Cooling',sc:0,tools:['torque','lamp'],jobPack:['Thermostat/housing','Seal','Coolant top-up'],access:['Coolant drain or partial drain','Hose access'],stages:['Prepare cooling system','Drain coolant as needed','Gain access','Replace thermostat','Inspect hoses','Bleed and heat cycle'],wy:[['waterpump','Water pump','Cooling overlap if already planned']]},supercharger:{title:'Supercharger Oil Service',sys:'W11 Supercharger',sc:1,tools:['beltTool','torque','lamp'],jobPack:['Correct supercharger oil','Gaskets/seals if disturbed','Intercooler boot clamps if needed'],access:['W11 only','Intercooler removal/access','Belt tool useful for related access'],stages:['Prepare W11 service','Remove intercooler/access parts','Service front chamber','Service rear chamber','Inspect coupler and bypass valve','Reassemble and test'],wy:[['waterpump','Water pump','Good overlap on W11 with charger access'],['auxbelt','Auxiliary belt','Inspect while belt access exists']]},gearbox:{title:'Gearbox Oil Service',sys:'Transmission',sc:0,tools:['jack','stands','fluidPump','torque','lamp'],jobPack:['Correct gearbox oil','Drain/fill washers if required'],access:['Vehicle level and safely raised','Fill plug confirmed before draining'],stages:['Confirm gearbox fluid spec','Check fill plug opens','Drain oil','Inspect old oil','Refill to level','Road test and leak check'],wy:[]},evap:{title:'EVAP Purge / Idle Diagnosis',sys:'Fuel / Emissions',sc:0,tools:['scanner','smoke','lamp'],jobPack:['Purge valve if faulty','Vacuum hose if damaged'],access:['Engine bay access','Canister/line access as needed'],stages:['Confirm symptom pattern','Inspect hoses/connectors','Test purge valve','Check canister route','Scan fuel trims','Repair and retest'],wy:[]}};const toolDb={beltTool:{name:'MINI serpentine belt tool',type:'Essential platform tool',unlocks:['timing','auxbelt','supercharger','waterpump'],why:'Low-cost tool that makes belt release far easier and protects the tensioner/belt.'},engineSupport:{name:'Engine support beam',type:'Platform tool',unlocks:['timing','engine mounts'],why:'Required when engine mount removal is part of the job.'},timingKit:{name:'W11 timing locking kit',type:'Specialist precision tool',unlocks:['timing'],why:'Essential for accurate valve timing. Do not rely on paint marks alone.'},torque:{name:'Torque wrench',type:'Core workshop tool',unlocks:['standard','auxbelt','timing','sump','waterpump','gearbox'],why:'Required for reliable reassembly and fastener safety.'},oilSocket:{name:'Oil filter cap socket',type:'Service platform tool',unlocks:['standard','timing','sump'],why:'Used on service and oil-related jobs.'},plugSocket:{name:'Spark plug socket',type:'Service platform tool',unlocks:['standard','misfire diagnosis'],why:'Used for plug replacement and compression testing prep.'},jack:{name:'Trolley jack',type:'Core workshop tool',unlocks:['standard','sump','gearbox','brakes'],why:'Needed for safe access when paired with axle stands.'},stands:{name:'Axle stands',type:'Safety tool',unlocks:['standard','sump','gearbox','brakes'],why:'Never rely on a jack alone.'},lamp:{name:'Inspection lamp',type:'Core workshop tool',unlocks:['all'],why:'Nearly every module needs proper visibility.'},fluidPump:{name:'Fluid transfer pump',type:'Service tool',unlocks:['gearbox','diff/transfer where applicable'],why:'Makes gearbox filling practical and clean.'},scanner:{name:'OBD scanner',type:'Diagnostic tool',unlocks:['evap','misfire','emissions'],why:'Reads codes and live data.'},smoke:{name:'Smoke tester',type:'Diagnostic specialist tool',unlocks:['evap','vacuum leaks'],why:'Useful for finding air/vapour leaks quickly.'},puller:{name:'Crank pulley puller',type:'Specialist tool',unlocks:['timing','crank pulley'],why:'Avoids damage when removing pulley.'}};const kbRecords=[['PP-SRV-001','Annual Service','Draft module created with oil/filter/air/cabin/spark plug workflow.'],['PP-ENG-002','Auxiliary Belt Replacement','Draft module created with belt tool, routing and tensioner inspection.'],['PP-TOOL-001','MINI serpentine belt tool','Essential platform tool for belt, timing, supercharger, water pump and alternator jobs.'],['PP-TOOL-002','Engine support beam','Required when right engine mount is removed.'],['PP-FLD-001','Engine oil','Specification/capacity still verification-required by engine variant.'],['PP-CMP-001','Auxiliary belt','Inspection criteria: cracking, glazing, contamination, fraying and noise.'],['PP-CMP-002','Oil filter','Replace with oil service; inspect cap and O-ring.'],['PP-OPP-001','Timing chain → front crank seal','High opportunity; crank pulley already removed.']];let st=JSON.parse(localStorage.projectPistonV13||localStorage.projectPistonV12||'{}');st.v=st.v||'r52-cooper-s';st.m=st.m||'standard';st.done=st.done||{};st.pass=st.pass||[];st.evidence=st.evidence||{};st.feedback=st.feedback||[];st.owned=st.owned||{};st.current=st.current||0;st.parent=null;veh.innerHTML=vehicles.map(v=>`<option value='${v[0]}'>${v[1]} · ${v[2]} · ${v[3]} · ${v[4]}</option>`).join('');function V(){return vehicles.find(v=>v[0]==st.v)||vehicles[3]}function avail(){return Object.entries(mods).filter(([id,m])=>!m.sc||V()[5]).map(([id,m])=>[id,m])}function M(){return mods[st.m]||mods.standard}function save(){localStorage.projectPistonV13=JSON.stringify(st);render()}veh.onchange=()=>{st.v=veh.value;if(!mods[st.m]||mods[st.m].sc&&!V()[5])st.m='standard';st.current=0;save()};mod.onchange=()=>{st.m=mod.value;st.current=0;save()};function stages(){return M().stages.map((n,i)=>({name:n,evidence:i==0?[]:i==1?['before','after']:i==2?['linked-before','after']:i==3?['during','extra']:i==M().stages.length-2?['after']:[],instructions:stageInstructions(n),reason:i==0?'No photo evidence required.':i==1?'Before and after access photos.':i==2?'Linked before plus after photo.':i==3?'Add picture for each inspected component.':i==M().stages.length-2?'Final assembled state photo.':'Notes only.'}))}function stageInstructions(n){return ['Review '+n+'.','Work methodically and avoid unnecessary dismantling.','Record technician notes for faults, variant differences or follow-up work.']}function k(i){return st.m+'-'+i}function done(){return stages().filter((_,i)=>st.done[k(i)]).length}function evkey(i,t){return k(i)+'-'+t}function ev(i,t){return st.evidence[evkey(i,t)]||0}function capture(i,t){st.evidence[evkey(i,t)]=(st.evidence[evkey(i,t)]||0)+1;st.pass.push({d:new Date().toLocaleDateString(),job:M().title,step:stages()[i].name,type:'Evidence '+t,car:V()[1]});save()}function req(i){return stages()[i].evidence.filter(x=>x!='extra'&&x!='linked-before')}function verified(i){return req(i).every(t=>ev(i,t)>0)}function list(a){return '<ul class="instruction-list">'+a.map(x=>`<li>${x}</li>`).join('')+'</ul>'}function evidenceActions(i){let e=stages()[i].evidence;if(!e.length)return '<p class="muted small">No photo evidence required.</p>';let out='';if(e.includes('linked-before'))out+=`<div class='part linked'><b>Before image linked</b><p class='small'>Uses previous access after-photo.</p></div>`;['before','during','after'].forEach(t=>{if(e.includes(t))out+=`<button onclick="capture(${i},'${t}')">${t[0].toUpperCase()+t.slice(1)} photo (${ev(i,t)})</button>`});if(e.includes('extra'))out+=`<button class='primary' onclick="capture(${i},'extra')">Add picture (${ev(i,'extra')})</button>`;return `<div class='evidence-actions'>${out}</div>`}function nextStage(){st.current=Math.min(stages().length-1,st.current+1);save()}function prevStage(){st.current=Math.max(0,st.current-1);save()}function mark(i){st.done[k(i)]=!st.done[k(i)];if(st.done[k(i)])st.pass.push({d:new Date().toLocaleDateString(),job:M().title,step:stages()[i].name,type:'Step completed',car:V()[1]});save()}function openSubJob(id){st.parent={m:st.m,current:st.current,name:M().title};st.m=id;st.current=0;save();document.querySelector('[data-t="garage"]').click()}function returnParent(){if(st.parent){let p=st.parent;st.m=p.m;st.current=p.current;st.parent=null;save()}}function stageCard(s,i){return `<section class='stage-card'><div class='stage-title'><div><h3>${i+1}. ${s.name}</h3><p class='muted'>${s.reason}</p></div><span class='pill ${i==st.current?'warn':(req(i).length?(verified(i)?'ok':'warn'):'ok')}'>${i==st.current?'Current':(req(i).length?(verified(i)?'Evidence complete':'Evidence needed'):'No evidence required')}</span></div><div class='stage-layout'><div class='instruction-box'><h4>Instructions</h4>${list(s.instructions)}<h4>Access Profile</h4>${list(M().access)}<h4>Job Pack</h4>${list(M().jobPack)}<textarea placeholder='Technician notes, faults found, variant differences, follow-up reminders...'></textarea></div><aside class='evidence-box'><h4>Evidence</h4>${evidenceActions(i)}<hr><h4>Torque</h4><p class='small muted'>Verification required before release.</p><hr><button onclick="mark(${i})">${st.done[k(i)]?'Mark stage undone':'Mark stage done'}</button></aside></div></section>`}function timeline(){return `<div class='timeline'>${stages().map((s,i)=>`<div class='dot ${st.done[k(i)]?'done':''} ${i==st.current?'current':''}' onclick='st.current=${i};save()'><b>${i+1}. ${s.name.split('/')[0]}</b><p class='small muted'>${st.done[k(i)]?'Complete':(i==st.current?'Current':'Pending')}</p></div>`).join('')}</div>`}function whilstPanel(){let items=M().wy||[];if(!items.length)return '<p class="muted">No linked sub-jobs set for this module yet.</p>';return items.map(w=>`<button class='wy-btn' onclick="openSubJob('${w[0]}')"><b>${mods[w[0]]?mods[w[0]].title:w[0]}</b><p class='muted small'>${w[2]} · opens linked job</p></button>`).join('')}function readiness(){let required=new Set();Object.values(mods).forEach(m=>m.tools.forEach(t=>required.add(t)));let owned=[...required].filter(t=>st.owned[t]).length;return Math.round(owned/[...required].length*100)}function toolCard(id,t){let owned=!!st.owned[id];return `<button class='tool-btn ${owned?'tool-owned':'tool-missing'}' onclick="st.owned['${id}']=!st.owned['${id}'];save()"><b>${t.name}</b><p class='small'>${t.type}</p><p class='muted small'>${t.why}</p><span class='pill'>${owned?'Owned':'Missing'}</span><span class='pill'>Unlocks ${t.unlocks.length}</span></button>`}function need(){let r=0,h=0;stages().forEach((s,i)=>req(i).forEach(t=>{r++;if(ev(i,t)>0)h++}));return{r,h,p:r?Math.round(h/r*100):100}}function render(){veh.value=st.v;vehInfo.textContent=`${V()[2]} · ${V()[3]} · ${V()[4]}`;mod.innerHTML=avail().map(([id,m])=>`<option value='${id}'>${m.title}</option>`).join('');mod.value=st.m;modInfo.textContent=M().sys;let p=Math.round(done()/stages().length*100);pct.textContent=p+'%';bar.style.width=p+'%';let en=need();let returnbar=st.parent?`<div class='returnbar'><b>Linked sub-job from ${st.parent.name}</b><p>Complete or return to parent repair.</p><button onclick='returnParent()'>Return to parent</button></div>`:'';home.innerHTML=`<h2>Sprint 3 Dashboard</h2><div class='grid'><div><h3>${V()[1]}</h3><p>${V()[3]} · ${V()[4]}</p></div><div><h3>${M().title}</h3><p>${done()} of ${stages().length} stages complete.</p></div><div><h3>Workshop Readiness</h3><p>${readiness()}% based on tool ownership.</p></div></div><div class='notice'>Added Annual Service, Auxiliary Belt, Tool Database, Workshop Builder and Knowledge Base records.</div>`;garage.innerHTML=`<h2>Garage Mode</h2>${returnbar}${timeline()}<p><button onclick='prevStage()'>Back</button> <button class='primary' onclick='nextStage()'>Next</button></p>${stageCard(stages()[st.current],st.current)}<div class='side-panels'><div class='panel'><h3>Required Tools</h3>${M().tools.map(id=>`<p><b>${toolDb[id]?.name||id}</b> <span class='pill ${st.owned[id]?'ok':'warn'}'>${st.owned[id]?'Owned':'Missing'}</span></p>`).join('')}</div><div class='panel'><h3>Whilst You’re There</h3>${whilstPanel()}</div><div class='panel'><h3>Evidence</h3><p>${en.h}/${en.r} required points captured.</p></div></div>`;tools.innerHTML=`<h2>Workshop Builder</h2><p>Tap tools to mark owned. Tool ownership changes Workshop Readiness and shows what repairs are unlocked.</p><h3>Readiness: ${readiness()}%</h3><div class='progress'><span style='width:${readiness()}%'></span></div><div class='grid'>${Object.entries(toolDb).map(([id,t])=>toolCard(id,t)).join('')}</div>`;kb.innerHTML=`<h2>Knowledge Base</h2><p class='muted'>Early database records created during Sprint 3. Confidence levels still need final verification.</p>${kbRecords.map(r=>`<div class='kb'><b>${r[0]} — ${r[1]}</b><p>${r[2]}</p></div>`).join('')}<h3>Validation Flags</h3><ul><li>Confirm preferred annual service order.</li><li>Confirm preferred spark plug/ignition inspection wording.</li><li>Confirm whether auxiliary belt tensioner should be replaced proactively at high mileage.</li><li>Torque and fluid values remain verification-required.</li></ul>`;voice.innerHTML=`<h2>Workshop Voice</h2><div class='voice'><h3>Hands-free workflow</h3><span class='cmd'>Next</span><span class='cmd'>Back</span><span class='cmd'>Repeat</span><span class='cmd'>Torque</span><span class='cmd'>Tools</span><span class='cmd'>Parts</span><span class='cmd'>Take photo</span><span class='cmd'>Add note</span><span class='cmd'>Finished</span></div>`;evidence.innerHTML=`<h2>Evidence Protocol</h2><div class='job'><b>Prep</b><p>No photos.</p></div><div class='job'><b>Access</b><p>Before + after. After doubles as repair before.</p></div><div class='job'><b>Repair</b><p>Linked before + after.</p></div><div class='job'><b>Inspect</b><p>Add picture per inspected component.</p></div>`;parts.innerHTML=`<h2>Curated Parts & Tools</h2><div class='three'><div class='part'><h3>Budget</h3><p>Approved low-cost option.</p></div><div class='part'><h3>Recommended</h3><p>Best value for most owners.</p></div><div class='part'><h3>Premium</h3><p>OEM/premium aftermarket. Sponsored only if quality criteria are met.</p></div></div>`;feedback.innerHTML=`<h2>Suggest Update</h2><select id='fbtype'><option>Improve this job</option><option>Suggest a new job</option><option>Suggest a change with reason</option><option>Report conflict / variant difference</option><option>Other</option></select><textarea id='fbtext' placeholder='What should change and why?'></textarea><button onclick="st.feedback.push({type:fbtype.value,text:fbtext.value,module:M().title,vehicle:V()[1],date:new Date().toLocaleDateString()});fbtext.value='';save()">Save suggestion</button>${st.feedback.length?st.feedback.slice().reverse().map(f=>`<div class='job'><b>${f.type}</b><p>${f.text}</p><p class='muted'>${f.module} · ${f.vehicle} · ${f.date}</p></div>`).join(''):'<p>No suggestions yet.</p>'}`;passport.innerHTML=`<h2>Vehicle Passport</h2>${st.pass.length?st.pass.slice().reverse().map(p=>`<div class='job'><b>${p.step}</b><p class='muted'>${p.d} · ${p.type} · ${p.job} · ${p.car}</p></div>`).join(''):'<p>No entries yet.</p>'}`}document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');['home','garage','tools','kb','voice','evidence','parts','feedback','passport'].forEach(id=>document.getElementById(id).classList.add('hidden'));document.getElementById(b.dataset.t).classList.remove('hidden')});render();</script></body></html>
