<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Project Piston v8</title>
<style>
body{margin:0;background:#f3f4f6;color:#111827;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif}.wrap{max-width:1180px;margin:auto;padding:18px}.hero{background:#111827;color:white;border-radius:24px;padding:24px}.hero p{color:#d1d5db}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:16px;box-shadow:0 8px 24px #0001;margin:14px 0}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0}.tab{border:0;background:#fff;border-radius:999px;padding:10px 14px;box-shadow:0 4px 14px #0001}.active{background:#111827!important;color:#fff}.hidden{display:none}.muted{color:#6b7280}.stat{font-size:34px;font-weight:800}select,textarea{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:12px;font:inherit}.pill{display:inline-block;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:12px;padding:4px 8px;margin:2px}.danger{background:#fee2e2;color:#991b1b}.warn{background:#fff7ed;color:#9a3412}.ok{background:#dcfce7;color:#166534}.job,.step{border-bottom:1px solid #eee;padding:14px 0}.progress{height:12px;background:#e5e7eb;border-radius:999px;overflow:hidden}.progress span{display:block;height:100%;background:#111827}.notice{background:#fff7ed;border:1px solid #fed7aa;border-radius:14px;padding:12px;color:#9a3412}.three{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.part{border:1px solid #e5e7eb;border-radius:14px;padding:12px}.diagram{width:100%;max-width:900px;border-radius:14px;border:1px solid #e5e7eb}@media(max-width:800px){.three{grid-template-columns:1fr}}
</style></head><body><div class="wrap">
<section class="hero"><h1>Project Piston</h1><p>The workshop companion we wish existed: guidance, Garage Mode, evidence capture, curated parts, community events and continuous improvement.</p></section>
<div class="grid"><div class="card"><div class="muted">Select vehicle</div><select id="veh"></select><p id="vehInfo" class="muted"></p></div><div class="card"><div class="muted">Job module</div><select id="mod"></select><p id="modInfo" class="muted"></p></div><div class="card"><div class="muted">Progress</div><div class="stat" id="pct">0%</div><div class="progress"><span id="bar"></span></div></div></div>
<nav class="tabs"><button class="tab active" data-t="home">Home</button><button class="tab" data-t="garage">Garage Mode</button><button class="tab" data-t="evidence">Evidence</button><button class="tab" data-t="parts">Parts</button><button class="tab" data-t="community">Community</button><button class="tab" data-t="feedback">Suggest Update</button><button class="tab" data-t="roadmap">Roadmap</button><button class="tab" data-t="passport">Vehicle Passport</button></nav>
<main id="home" class="card"></main><main id="garage" class="card hidden"></main><main id="evidence" class="card hidden"></main><main id="parts" class="card hidden"></main><main id="community" class="card hidden"></main><main id="feedback" class="card hidden"></main><main id="roadmap" class="card hidden"></main><main id="passport" class="card hidden"></main>
</div><script>
const vehicles=[['r50-one','R50 MINI One','Hatchback','W10','Naturally aspirated',0],['r50-cooper','R50 MINI Cooper','Hatchback','W10','Naturally aspirated',0],['r52-cooper','R52 MINI Cooper Convertible','Convertible','W10','Naturally aspirated',0],['r52-cooper-s','R52 MINI Cooper S Convertible','Convertible','W11','Eaton M45 supercharged',1],['r53-cooper-s','R53 MINI Cooper S Hatchback','Hatchback','W11','Eaton M45 supercharged',1]];
const mods=[['standard','Standard Annual Service','Engine / Service',0],['timing','Timing Chain Replacement','Engine / Timing',0],['sump','Sump & Oil Pickup Clean','Lubrication',0],['supercharger','Supercharger Oil Service','Supercharger / Cooling',1],['waterpump','Water Pump Replacement','Cooling',0],['gearbox','Gearbox Oil Service','Transmission',0],['evap','EVAP Purge / Idle Diagnosis','Fuel / Emissions / Idle',0]];
const stages=['Prepare tools and workspace','Gain access / remove obstructing parts','Carry out repair or service','Inspect related components','Reassemble carefully','Road test and final check'];
let st=JSON.parse(localStorage.projectPistonV8||'{}');st.v=st.v||'r52-cooper-s';st.m=st.m||'timing';st.done=st.done||{};st.pass=st.pass||[];st.feedback=st.feedback||[];st.evidence=st.evidence||{};
veh.innerHTML=vehicles.map(v=>`<option value="${v[0]}">${v[1]} · ${v[2]} · ${v[3]} · ${v[4]}</option>`).join('');
function V(){return vehicles.find(v=>v[0]==st.v)||vehicles[3]}function A(){return mods.filter(m=>!m[3]||V()[5])}function M(){return A().find(m=>m[0]==st.m)||A()[0]}function save(){localStorage.projectPistonV8=JSON.stringify(st);render()}veh.onchange=()=>{st.v=veh.value;if(!A().some(m=>m[0]==st.m))st.m=A()[0][0];save()};mod.onchange=()=>{st.m=mod.value;save()};function k(i){return st.m+'-'+i}function done(){return stages.filter((_,i)=>st.done[k(i)]).length}function addEvidence(i,t){let id=k(i)+'-'+t;st.evidence[id]=(st.evidence[id]||0)+1;st.pass.push({d:new Date().toLocaleDateString(),job:M()[1],step:stages[i],type:'Evidence '+t,car:V()[1]});save()}function ev(i,t){return st.evidence[k(i)+'-'+t]||0}
function render(){veh.value=st.v;vehInfo.textContent=`${V()[2]} · ${V()[3]} · ${V()[4]}`;mod.innerHTML=A().map(m=>`<option value="${m[0]}">${m[1]}</option>`).join('');mod.value=st.m;modInfo.textContent=M()[2];let p=Math.round(done()/stages.length*100);pct.textContent=p+'%';bar.style.width=p+'%';
home.innerHTML=`<h2>Home</h2><div class="grid"><div><h3>${V()[1]}</h3><p>${V()[3]} · ${V()[4]}</p></div><div><h3>${M()[1]}</h3><p>${done()} of ${stages.length} stages complete.</p></div><div><h3>Project Piston principle</h3><p>Save time, prevent mistakes, build confidence, or add genuine value.</p></div></div><div class="notice">Torque values, exact fluid quantities and OEM part numbers remain verification-required.</div>`;
garage.innerHTML=`<h2>Garage Mode</h2>${stages.map((s,i)=>`<div class="step"><b>${i+1}. ${s}</b><p class="muted">Access notes, likely removals, tools, common mistakes and technician notes are attached to each stage.</p><p><button onclick="st.done['${k(i)}']=!st.done['${k(i)}'];if(st.done['${k(i)}'])st.pass.push({d:new Date().toLocaleDateString(),job:M()[1],step:'${s}',type:'Step completed',car:V()[1]});save()">${st.done[k(i)]?'Mark undone':'Mark done'}</button></p><div class="three"><button onclick="addEvidence(${i},'before')">Before (${ev(i,'before')})</button><button onclick="addEvidence(${i},'during')">During (${ev(i,'during')})</button><button onclick="addEvidence(${i},'after')">After (${ev(i,'after')})</button></div></div>`).join('')}`;
evidence.innerHTML=`<h2>Verified Repair Evidence</h2><div class="three"><div class="part"><h3>Bronze</h3><p>Routine work: before + after.</p></div><div class="part"><h3>Silver</h3><p>Major repair: before + key during + after.</p></div><div class="part"><h3>Gold</h3><p>Workshop-certified: richer photos/video, parts evidence and torque confirmations.</p></div></div><p class="muted">Prototype buttons simulate capture. Live version opens camera or quick video capture.</p><img class="diagram" src="diagrams/evidence-flow.svg">`;
parts.innerHTML=`<h2>Curated Parts</h2><p>No pop-ups. Three clear choices only.</p><div class="three"><div class="part"><h3>Budget</h3><p>Approved low-cost option.</p></div><div class="part"><h3>Recommended</h3><p>Best value for most repairs.</p></div><div class="part"><h3>Premium</h3><p>OEM or premium aftermarket; sponsor placement only if quality criteria are met.</p></div></div>`;
community.innerHTML=`<h2>Community</h2><div class="grid"><div class="part"><h3>Official Club Event</h3><p>Recognised club or organisation.</p></div><div class="part"><h3>Verified Community Event</h3><p>Organiser checked.</p></div><div class="part"><h3>Private Meet</h3><p>Grassroots enthusiast meet.</p></div><div class="part"><h3>Technical Day</h3><p>Workshop learning day.</p></div><div class="part"><h3>Workshop Open Day</h3><p>Garage-hosted event.</p></div><div class="part"><h3>Parts Swap</h3><p>Tools and spares meet.</p></div></div>`;
feedback.innerHTML=`<h2>Suggest Update</h2><select id="fbtype"><option>Improve this job</option><option>Suggest a new job</option><option>Suggest a change with reason</option><option>Report conflict / variant difference</option><option>Other</option></select><textarea id="fbtext" placeholder="What should change and why?"></textarea><button onclick="st.feedback.push({type:fbtype.value,text:fbtext.value,module:M()[1],vehicle:V()[1],date:new Date().toLocaleDateString()});fbtext.value='';save()">Save suggestion</button><h3>Saved suggestions</h3>${st.feedback.length?st.feedback.slice().reverse().map(f=>`<div class="job"><b>${f.type}</b><p>${f.text}</p><p class="muted">${f.module} · ${f.vehicle} · ${f.date}</p></div>`).join(''):'<p>No suggestions yet.</p>'}`;
roadmap.innerHTML=`<h2>Roadmap</h2><div class="job"><b>Benchmark module</b><p>Make Timing Chain Replacement exceptional with verified torque data, real photos, annotated diagrams and voice prompts.</p></div><div class="job"><b>Hands-free assistant</b><p>Next, Repeat, Back, Torque, Diagram, Photo, Note, Finished.</p></div><div class="job"><b>Professional subscription</b><p>Cloud backup, team accounts, customer reports and workshop branding.</p></div>`;
passport.innerHTML=`<h2>Vehicle Passport</h2>${st.pass.length?st.pass.slice().reverse().map(p=>`<div class="job"><b>${p.step}</b><p class="muted">${p.d} · ${p.type} · ${p.job} · ${p.car}</p></div>`).join(''):'<p>No entries yet.</p>'}`;
}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');['home','garage','evidence','parts','community','feedback','roadmap','passport'].forEach(id=>document.getElementById(id).classList.add('hidden'));document.getElementById(b.dataset.t).classList.remove('hidden')});render();
</script></body></html>
