<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MINI Workshop</title><style>body{margin:0;background:#f3f4f6;color:#111827;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif}.wrap{max-width:1120px;margin:auto;padding:18px}.hero{background:#111827;color:#fff;border-radius:24px;padding:24px}.hero p{color:#d1d5db}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:16px;box-shadow:0 8px 24px #0001;margin:14px 0}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{border:0;background:#fff;border-radius:999px;padding:10px 14px;box-shadow:0 4px 14px #0001}.active{background:#111827!important;color:#fff}.hidden{display:none}.muted{color:#6b7280}.pill{display:inline-block;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:12px;padding:4px 8px;margin:2px}.danger{background:#fee2e2;color:#991b1b}.warn{background:#fff7ed;color:#9a3412}.ok{background:#dcfce7;color:#166534}.step{border-bottom:1px solid #eee;padding:14px 0}.step:last-child{border-bottom:0}.head{display:flex;gap:12px;align-items:flex-start}.head input{margin-top:6px;transform:scale(1.2)}select,textarea{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:12px;font:inherit}.detail{margin:12px 0 0 32px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:14px;padding:12px}.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}.diagram{background:linear-gradient(135deg,#e5e7eb,#f9fafb);border:1px dashed #9ca3af;border-radius:14px;min-height:140px;display:flex;align-items:center;justify-content:center;text-align:center;color:#6b7280;padding:12px}.progress{height:12px;background:#e5e7eb;border-radius:999px;overflow:hidden}.progress span{display:block;height:100%;background:#111827}@media(max-width:750px){.two{grid-template-columns:1fr}.detail{margin-left:0}}</style></head><body><div class="wrap"><section class="hero"><h1>MINI Workshop</h1><p>Guided Garage Mode preview with access notes, parts-to-remove lists, diagrams/photo placeholders and technician notes.</p></section><div class="grid"><div class="card"><div class="muted">Select your MINI</div><select id="veh"></select><p id="vehInfo" class="muted"></p></div><div class="card"><div class="muted">Job module</div><select id="mod"></select><p id="modInfo" class="muted"></p></div><div class="card"><div class="muted">Progress</div><h1 id="pct">0%</h1><div class="progress"><span id="bar"></span></div></div></div><nav class="tabs"><button class="tab active" data-t="home">Home</button><button class="tab" data-t="garage">Garage Mode</button><button class="tab" data-t="access">Access Map</button><button class="tab" data-t="whilst">Whilst You're There</button><button class="tab" data-t="passport">Vehicle Passport</button></nav><main id="home" class="card"></main><main id="garage" class="card hidden"></main><main id="access" class="card hidden"></main><main id="whilst" class="card hidden"></main><main id="passport" class="card hidden"></main></div><script>const vehicles=[['r50-one','R50 MINI One','Hatchback','W10','Naturally aspirated',0],['r50-cooper','R50 MINI Cooper','Hatchback','W10','Naturally aspirated',0],['r52-cooper','R52 MINI Cooper Convertible','Convertible','W10','Naturally aspirated',0],['r52-cooper-s','R52 MINI Cooper S Convertible','Convertible','W11','Eaton M45 supercharged',1],['r53-cooper-s','R53 MINI Cooper S Hatchback','Hatchback','W11','Eaton M45 supercharged',1]];function S(t,c,g,a,r,tools,mist,img,wy){return{t,c,g,a,r,tools,mist,img,wy}}const timing=[S('Prepare tools, parts and workspace','Preparation','Prevent delays once the front end is apart.',['Park level and cool engine','Confirm timing locking tools','Lay out chain kit, seals, oil and filter'],['Nothing yet'],['Cam/crank locking tools','Crank pulley puller','Torque wrench','E-torx sockets'],['Starting without locking tools','Missing oil/filter for restart'],'Tool and parts layout photo placeholder',['Decide now whether sump clean and seals will be included']),S('Disconnect battery','Safety','Protect vehicle electrics before strip-down.',['Open battery area','Remove negative terminal','Keep terminal isolated'],['Battery cover if fitted','Negative terminal'],['10mm spanner/socket'],['Terminal touching post again','Forgetting electrical resets'],'Battery terminal image placeholder',['Check terminal corrosion']),S('Create front-end access / service mode','Access','Create working room without straining hoses or wiring.',['Remove grille/bumper fixings as required','Support radiator pack if moved forward','Do not strain AC lines'],['Front grille/bumper','Undertray/arch liner sections','Front panel fixings as required'],['Socket set','Torx tools','Trim tools','Support straps'],['Letting radiator hang from hoses','Breaking old clips','Not photographing bolt locations'],'Service mode/front end diagram placeholder',['Fan resistor','Radiator inspection','AC condenser inspection']),S('Remove auxiliary belt','Access','Clear belt drive and inspect related parts.',['Record belt routing','Release tensioner safely','Inspect belt path'],['Auxiliary belt','Shielding blocking belt access'],['Belt/tensioner tool','Inspection light'],['Forgetting belt routing','Ignoring noisy idlers'],'Auxiliary belt routing diagram placeholder',['Auxiliary belt','Tensioner','Idlers','Crank pulley']),S('Remove crank pulley','Access','Remove pulley safely and inspect harmonic damper.',['Use correct crank holding method','Wheel arch access may help','Do not lever against timing cover'],['Arch liner section if required','Pulley bolt','Crank pulley'],['Crank pulley puller','Breaker bar','Torque wrench'],['Levering on timing cover','Ignoring separated rubber damper'],'Crank pulley puller position placeholder',['Front crank seal','Auxiliary belt','Lower mount']),S('Remove valve cover','Access','Expose upper timing components.',['Remove leads/coils/breathers carefully','Keep dirt out of engine'],['Ignition leads/coils','Breather pipes','Valve cover'],['Socket set','Plastic trim tool'],['Breaking brittle breather pipes','Dropping dirt into engine'],'Valve cover bolt map placeholder',['Valve cover gasket','Breather inspection','Spark plugs']),S('Lock crank and camshaft','Critical','Preserve exact timing before removing chain.',['Rotate only as specified','Fit locking tools fully','Stop if tools do not seat'],['Access plugs/covers required for locking tools'],['Cam locking tool','Crank locking tool'],['Using paint marks alone','Moving crank/cam independently'],'Cam/crank locking tool diagram placeholder',['Verify timing position twice']),S('Remove old chain, guides and tensioner','Procedure','Remove worn parts and document failure evidence.',['Remove tensioner and guides methodically','Catch guide fragments where possible'],['Tensioner','Chain guides','Timing chain'],['E-torx sockets','Magnet/pickup tool','Parts tray'],['Dropping fragments into sump','Mixing fasteners'],'Timing chain exploded diagram placeholder',['Inspect guide debris','Plan sump clean if fragments missing']),S('Inspect sump contamination risk','Critical','Decide whether sump/pickup cleaning is required.',['Inspect oil/filter/drained oil','Look for missing guide pieces'],['Oil filter if inspecting','Drain oil if needed'],['Drain pan','Inspection light'],['Assuming debris disappeared','Restarting with unknown pickup condition'],'Oil pickup debris risk diagram placeholder',['Sump removal','Oil pickup clean','Second oil/filter change']),S('Fit new chain, guides and tensioner','Procedure','Install new timing parts with alignment controlled.',['Keep locking tools in place','Clean guide seats','Follow tensioner procedure'],['No extra removal; install stage'],['Timing kit','Torque wrench'],['Incorrect guide seating','Unlocking timing too early'],'New chain install diagram placeholder',['Replace accessible seals before closing']),S('Replace accessible seals','Whilst there','Prevent future leaks while access is available.',['Crank seal accessible with pulley removed','Cam seals accessible depending on strip level'],['Old crank seal','Cam seals if included'],['Seal pick','Seal installer'],['Scratching seal bore','Driving seal crooked'],'Crank/cam seal locations placeholder',['Front crank seal','Camshaft seals']),S('Reassemble, refill and initial start','Check','Confirm quiet start, no leaks and stable running.',['Reverse removal order','Check belt routing/connectors','Check oil before start'],['Temporary locks/supports only when correct'],['Torque wrench','Fluid funnel','Scan tool'],['Leaving locking tool fitted','Incorrect belt routing','Ignoring leak'],'Final inspection checklist placeholder',['Road test','Second oil/filter change'])];function G(title,sys,steps,wy,sc=0){return{id:title.toLowerCase().replaceAll(' ','-'),title,sys,ap:sc?'sc':'all',steps,wy}}const generic=['Inspect access','Remove obstructing parts','Carry out service/repair','Inspect related parts','Reassemble','Road test/check'].map(x=>S(x,'General','Complete stage carefully and inspect before moving on.',['Confirm safe access','Remove only what is needed','Label fixings'],['Covers/trim/fasteners as needed'],['Basic hand tools','Inspection light','Torque wrench if required'],['Mixing bolts','Rushing reassembly'],'Add photo/diagram for this stage',['Inspect adjacent hoses, wiring and seals']));const mods=[G('Timing Chain Replacement','Engine / Timing',timing,[['Sump clean','Critical'],['Cam/crank seals','High'],['Crank pulley','High'],['Auxiliary belt','High']]),G('Sump Removal & Oil Pickup Clean','Lubrication',generic,[['Oil pump inspection','High'],['Timing chain inspection','High']]),G('Supercharger Oil Service','Supercharger / Cooling',generic,[['Water pump','High'],['Thermostat','Medium'],['Intercooler clean','Medium']],1),G('Water Pump Replacement','Cooling',generic,[['Thermostat','Medium'],['Coolant flush','High']]),G('Gearbox Oil Service','Transmission',generic,[['Driveshaft boots','Medium'],['Gearbox mount','Medium']])];let st=JSON.parse(localStorage.miniV8||'{}');st.v=st.v||'r52-cooper-s';st.m=st.m||mods[0].id;st.done=st.done||{};st.pass=st.pass||[];veh.innerHTML=vehicles.map(v=>`<option value="${v[0]}">${v[1]} · ${v[2]} · ${v[3]} · ${v[4]}</option>`).join('');function V(){return vehicles.find(v=>v[0]==st.v)||vehicles[3]}function avail(){return mods.filter(m=>m.ap=='all'||V()[5])}function M(){return avail().find(m=>m.id==st.m)||avail()[0]}function key(i){return M().id+'-'+i}veh.onchange=()=>{st.v=veh.value;if(!avail().some(m=>m.id==st.m))st.m=avail()[0].id;save()};mod.onchange=()=>{st.m=mod.value;save()};function save(){localStorage.miniV8=JSON.stringify(st);render()}function done(){return M().steps.filter((_,i)=>st.done[key(i)]).length}function list(a){return'<ul>'+a.map(x=>'<li>'+x+'</li>').join('')+'</ul>'}function pill(x){return x=='Critical'?'danger':x=='High'?'warn':'ok'}function step(s,i){let k=key(i);return `<div class="step"><div class="head"><input type="checkbox" ${st.done[k]?'checked':''} onchange="st.done['${k}']=this.checked;if(this.checked)st.pass.push({d:new Date().toLocaleDateString(),job:M().title,step:'${s.t}',car:V()[1]});save()"><div><b>${i+1}. ${s.t}</b><br><span class="pill">${s.c}</span><p class="muted">${s.g}</p><button onclick="document.getElementById('d${i}').classList.toggle('hidden')">Show / hide detail</button></div></div><div id="d${i}" class="detail hidden"><div class="two"><div><h4>Gain access</h4>${list(s.a)}<h4>Parts likely to remove</h4>${list(s.r)}<h4>Tools</h4>${list(s.tools)}</div><div><div class="diagram">${s.img}</div><h4>Common mistakes</h4>${list(s.mist)}<h4>Whilst you're here</h4>${list(s.wy)}</div></div><h4>Technician notes</h4><textarea placeholder="Add findings, bolt issues, leaks, damage, photos reference..."></textarea></div></div>`}function render(){veh.value=st.v;vehInfo.textContent=`${V()[2]} · ${V()[3]} · ${V()[4]}`;mod.innerHTML=avail().map(m=>`<option value="${m.id}">${m.title}</option>`).join('');mod.value=M().id;modInfo.textContent=M().sys;let p=Math.round(done()/M().steps.length*100);pct.textContent=p+'%';bar.style.width=p+'%';home.innerHTML=`<h2>Home</h2><p><b>${V()[1]}</b><br>${V()[3]} · ${V()[4]}</p><p><b>${M().title}</b>: ${done()} of ${M().steps.length} stages complete.</p>`;garage.innerHTML=`<h2>Garage Mode</h2><p class="muted">Each stage now includes access guidance, parts likely to remove, tools, mistakes, diagram/photo placeholders and technician notes.</p>${M().steps.map(step).join('')}`;access.innerHTML=`<h2>Access Map</h2>${M().steps.map((s,i)=>`<div class="step"><b>${i+1}. ${s.t}</b><p><b>Remove:</b> ${s.r.join(', ')}</p><p class="muted">${s.a.join(' ')}</p></div>`).join('')}`;whilst.innerHTML=`<h2>Whilst You're There</h2>${M().wy.map(w=>`<div class="step"><b>${w[0]}</b><br><span class="pill ${pill(w[1])}">${w[1]}</span></div>`).join('')}`;passport.innerHTML=`<h2>Vehicle Passport</h2>${st.pass.length?st.pass.slice().reverse().map(p=>`<div class="step"><b>${p.step}</b><p class="muted">${p.d} · ${p.job} · ${p.car}</p></div>`).join(''):'<p>No entries yet.</p>'}`}document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');['home','garage','access','whilst','passport'].forEach(id=>document.getElementById(id).classList.add('hidden'));document.getElementById(b.dataset.t).classList.remove('hidden')});render();</script></body></html>
