<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Project Piston Phase 2</title><style>body{margin:0;background:#eef0f3;color:#111827;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif}.wrap{max-width:1240px;margin:auto;padding:18px}.hero{background:#111827;color:#fff;border-radius:28px;padding:26px;box-shadow:0 16px 40px #0002}.hero p{color:#d1d5db}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:20px;padding:16px;box-shadow:0 8px 24px #0001;margin:14px 0}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0}.tab{border:0;background:#fff;border-radius:999px;padding:10px 14px;box-shadow:0 4px 14px #0001}.active{background:#111827!important;color:#fff}.hidden{display:none}.muted{color:#6b7280}.stat{font-size:34px;font-weight:800}select,textarea{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:12px;font:inherit}.pill{display:inline-block;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:12px;padding:4px 8px;margin:2px}.warn{background:#fff7ed;color:#9a3412}.ok{background:#dcfce7;color:#166534}.danger{background:#fee2e2;color:#991b1b}.progress{height:12px;background:#e5e7eb;border-radius:999px;overflow:hidden}.progress span{display:block;height:100%;background:#111827}.notice{background:#fff7ed;border:1px solid #fed7aa;border-radius:14px;padding:12px;color:#9a3412}.three{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.part,.panel{border:1px solid #e5e7eb;border-radius:16px;padding:12px;background:#fff}button{cursor:pointer;border:1px solid #d1d5db;background:#fff;border-radius:12px;padding:9px 12px}.primary{background:#111827;color:#fff}.linked{background:#ecfdf5;border:1px solid #bbf7d0;color:#166534}.stage-card{border:1px solid #d6dbe3;border-radius:22px;padding:16px;margin:16px 0;background:#fff;box-shadow:0 10px 28px #0000000d}.stage-layout{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:16px;align-items:start}.instruction-box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:16px;padding:14px}.evidence-box{background:#f8fafc;border:1px solid #dbeafe;border-radius:16px;padding:14px;position:sticky;top:12px}.stage-title{display:flex;align-items:center;justify-content:space-between;gap:10px}.evidence-actions{display:grid;grid-template-columns:1fr;gap:8px}.small{font-size:13px}.voice{background:#111827;color:#fff;border-radius:20px;padding:16px}.voice .cmd{display:inline-block;background:#1f2937;color:#fff;border:1px solid #374151;border-radius:999px;padding:7px 10px;margin:4px}.timeline{display:flex;gap:10px;overflow:auto;padding:8px 0}.dot{min-width:160px;border:1px solid #e5e7eb;background:#fff;border-radius:16px;padding:10px}.dot.done{border-color:#86efac;background:#f0fdf4}.dot.current{border-color:#fde68a;background:#fffbeb}.side-panels{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin:14px 0}.job{border-bottom:1px solid #eee;padding:14px 0}.instruction-list{padding-left:20px}@media(max-width:900px){.three,.stage-layout{grid-template-columns:1fr}.evidence-box{position:static}}</style></head><body><div class='wrap'><section class='hero'><h1>Project Piston</h1><p>Phase 2: Garage Mode 2.0, Workshop Voice, Timeline, torque placeholders, parts and whilst-you’re-there panels.</p></section><div class='grid'><div class='card'><div class='muted'>Vehicle</div><select id='veh'></select><p id='vehInfo' class='muted'></p></div><div class='card'><div class='muted'>Job module</div><select id='mod'></select><p id='modInfo' class='muted'></p></div><div class='card'><div class='muted'>Progress</div><div class='stat' id='pct'>0%</div><div class='progress'><span id='bar'></span></div></div></div><nav class='tabs'><button class='tab active' data-t='home'>Dashboard</button><button class='tab' data-t='garage'>Garage Mode 2.0</button><button class='tab' data-t='voice'>Workshop Voice</button><button class='tab' data-t='evidence'>Evidence</button><button class='tab' data-t='parts'>Parts</button><button class='tab' data-t='community'>Community</button><button class='tab' data-t='feedback'>Suggest Update</button><button class='tab' data-t='passport'>Vehicle Passport</button></nav><main id='home' class='card'></main><main id='garage' class='card hidden'></main><main id='voice' class='card hidden'></main><main id='evidence' class='card hidden'></main><main id='parts' class='card hidden'></main><main id='community' class='card hidden'></main><main id='feedback' class='card hidden'></main><main id='passport' class='card hidden'></main></div><script>const vehicles=[['r50-one','R50 MINI One','Hatchback','W10','Naturally aspirated',0],['r50-cooper','R50 MINI Cooper','Hatchback','W10','Naturally aspirated',0],['r52-cooper','R52 MINI Cooper Convertible','Convertible','W10','Naturally aspirated',0],['r52-cooper-s','R52 MINI Cooper S Convertible','Convertible','W11','Eaton M45 supercharged',1],['r53-cooper-s','R53 MINI Cooper S Hatchback','Hatchback','W11','Eaton M45 supercharged',1]];const mods=[['standard','Standard Annual Service','Engine / Service',0],['timing','Timing Chain Replacement','Engine / Timing',0],['sump','Sump & Oil Pickup Clean','Lubrication',0],['supercharger','Supercharger Oil Service','Supercharger / Cooling',1],['waterpump','Water Pump Replacement','Cooling',0],['gearbox','Gearbox Oil Service','Transmission',0],['evap','EVAP Purge / Idle Diagnosis','Fuel / Emissions / Idle',0]];const stages=[{id:'prep',name:'Prepare tools and workspace',evidence:[],reason:'No photo evidence required. This is planning and safety, not proof of repair.',instructions:['Confirm correct vehicle and engine selection.','Check parts, fluids and tools before dismantling.','Set up lighting, safe lifting and labelled containers for fixings.'],remove:['Nothing yet'],tools:['Parts list','Basic hand tools','Lighting','Gloves and bags/labels'],torque:'No torque values required at this stage.',why:'Prevents delays once parts are removed.'},{id:'access',name:'Gain access / remove obstructing parts',evidence:['before','after'],reason:'Before shows starting condition. After shows access achieved and doubles as the repair before-photo.',instructions:['Photograph the starting access area before removal.','Remove only the parts needed for clear working access.','Bag and label fasteners by area.','Photograph the exposed work area once access is achieved.'],remove:['Covers, trim or liners as needed','Bumper/front panel if service mode is needed','Obstructing intake or cooling parts where applicable'],tools:['Socket set','Torx/E-torx tools','Trim tools','Inspection light'],torque:'Refit torque values verification required.',why:'Creates working room without wasting time.'},{id:'repair',name:'Carry out service or repair',evidence:['linked-before','after'],reason:'Uses the access after-photo as the repair before-photo. Only after is required unless extra evidence is useful.',instructions:['Use the access after-photo as the repair before-photo.','Complete the replacement/service using the job module procedure.','Check fitment, routing and component seating before moving on.','Take the required after-photo when the repaired part is installed.'],remove:['Failed/worn component','Associated fasteners/seals/gaskets as required'],tools:['Job-specific tools','Torque wrench where required','Cleaner/rags'],torque:'Critical torque values to be verified before commercial release.',why:'This is the core repair stage.'},{id:'inspect',name:'Inspect related components',evidence:['during','extra'],reason:'One during photo for each extra inspected part. Use Add picture for each bush, seal, pulley, hose, leak or fault found.',instructions:['Inspect each related part while access is available.','Use Add picture for each additional finding.','Record why the item matters and whether action is needed now or later.'],remove:['No removal unless inspection requires it','Related part only if condition needs closer checking'],tools:['Inspection light','Mirror/borescope if needed','Pry bar or hand tools where appropriate'],torque:'No torque unless a part is replaced.',why:'This is where the app saves repeat strip-downs.'},{id:'reassemble',name:'Reassemble carefully',evidence:['after'],reason:'After photo confirms the final assembled state.',instructions:['Reassemble in reverse order with fixings returned to correct locations.','Check connectors, hoses, belt routing and clips.','Take one final after-photo of the completed assembly.'],remove:['Temporary supports or locking tools only when safe','Protective covers before final close-up'],tools:['Torque wrench','Basic hand tools','Checklist'],torque:'All disturbed fixings must use verified torque data where specified.',why:'Prevents missed connectors, clips or routing issues.'},{id:'roadtest',name:'Road test and final check',evidence:[],reason:'No mandatory photo. Record notes, warning lights, leaks or follow-up checks instead.',instructions:['Start and observe the repair area.','Check for leaks, warning lights, noises and abnormal smell.','Road test appropriately.','Record final technician notes and any follow-up reminders.'],remove:['Nothing'],tools:['Scan tool if needed','Inspection light','Fluid top-up kit'],torque:'No torque values required.',why:'Confirms the repair worked in real conditions.'}];const wy=[['Sump clean','Critical after timing guide failure'],['Crank seal','Cheap while pulley is removed'],['Auxiliary belt','Low extra labour while accessible'],['Water pump','Strong W11 supercharger overlap'],['Thermostat','Useful if cooling system is open']];let st=JSON.parse(localStorage.projectPistonV11||localStorage.projectPistonV10||localStorage.projectPistonV9||'{}');st.v=st.v||'r52-cooper-s';st.m=st.m||'timing';st.done=st.done||{};st.pass=st.pass||[];st.feedback=st.feedback||[];st.evidence=st.evidence||{};st.current=st.current||0;veh.innerHTML=vehicles.map(v=>`<option value='${v[0]}'>${v[1]} · ${v[2]} · ${v[3]} · ${v[4]}</option>`).join('');function V(){return vehicles.find(v=>v[0]==st.v)||vehicles[3]}function A(){return mods.filter(m=>!m[3]||V()[5])}function M(){return A().find(m=>m[0]==st.m)||A()[0]}function save(){localStorage.projectPistonV11=JSON.stringify(st);render()}veh.onchange=()=>{st.v=veh.value;if(!A().some(m=>m[0]==st.m))st.m=A()[0][0];save()};mod.onchange=()=>{st.m=mod.value;save()};function k(i){return st.m+'-'+i}function done(){return stages.filter((_,i)=>st.done[k(i)]).length}function evkey(i,t){return k(i)+'-'+t}function ev(i,t){return st.evidence[evkey(i,t)]||0}function capture(i,t){st.evidence[evkey(i,t)]=(st.evidence[evkey(i,t)]||0)+1;st.pass.push({d:new Date().toLocaleDateString(),job:M()[1],step:stages[i].name,type:'Evidence '+t,car:V()[1]});save()}function req(i){return stages[i].evidence.filter(x=>x!='extra'&&x!='linked-before')}function verified(i){return req(i).every(t=>ev(i,t)>0)}function list(a){return '<ul class="instruction-list">'+a.map(x=>`<li>${x}</li>`).join('')+'</ul>'}function evidenceActions(i){let e=stages[i].evidence;if(!e.length)return '<p class="muted small">No photo evidence required for this stage.</p>';let out='';if(e.includes('linked-before'))out+=`<div class='part linked'><b>Before image linked</b><p class='small'>Uses Gain Access after-photo.</p></div>`;['before','during','after'].forEach(t=>{if(e.includes(t))out+=`<button onclick="capture(${i},'${t}')">${t[0].toUpperCase()+t.slice(1)} photo (${ev(i,t)})</button>`});if(e.includes('extra'))out+=`<button class='primary' onclick="capture(${i},'extra')">Add picture (${ev(i,'extra')})</button>`;return `<div class='evidence-actions'>${out}</div>`}function need(){let r=0,h=0;stages.forEach((s,i)=>req(i).forEach(t=>{r++;if(ev(i,t)>0)h++}));return{r,h,p:r?Math.round(h/r*100):100}}function nextStage(){st.current=Math.min(stages.length-1,st.current+1);save()}function prevStage(){st.current=Math.max(0,st.current-1);save()}function mark(i){st.done[k(i)]=!st.done[k(i)];if(st.done[k(i)])st.pass.push({d:new Date().toLocaleDateString(),job:M()[1],step:stages[i].name,type:'Step completed',car:V()[1]});save()}function stageCard(s,i){return `<section class='stage-card'><div class='stage-title'><div><h3>${i+1}. ${s.name}</h3><p class='muted'>${s.reason}</p></div><span class='pill ${i==st.current?'warn':(req(i).length?(verified(i)?'ok':'warn'):'ok')}'>${i==st.current?'Current':(req(i).length?(verified(i)?'Evidence complete':'Evidence needed'):'No evidence required')}</span></div><div class='stage-layout'><div class='instruction-box'><h4>Instructions</h4>${list(s.instructions)}<h4>Parts likely to remove</h4>${list(s.remove)}<h4>Tools / checks</h4>${list(s.tools)}<h4>Why this matters</h4><p>${s.why}</p><textarea placeholder='Technician notes, faults found, variant differences, follow-up reminders...'></textarea></div><aside class='evidence-box'><h4>Evidence</h4>${evidenceActions(i)}<hr><h4>Torque</h4><p class='small muted'>${s.torque}</p><hr><button onclick="mark(${i})">${st.done[k(i)]?'Mark stage undone':'Mark stage done'}</button></aside></div></section>`}function timeline(){return `<div class='timeline'>${stages.map((s,i)=>`<div class='dot ${st.done[k(i)]?'done':''} ${i==st.current?'current':''}' onclick='st.current=${i};save()'><b>${i+1}. ${s.name.split('/')[0]}</b><p class='small muted'>${st.done[k(i)]?'Complete':(i==st.current?'Current':'Pending')}</p></div>`).join('')}</div>`}function render(){veh.value=st.v;vehInfo.textContent=`${V()[2]} · ${V()[3]} · ${V()[4]}`;mod.innerHTML=A().map(m=>`<option value='${m[0]}'>${m[1]}</option>`).join('');mod.value=st.m;modInfo.textContent=M()[2];let p=Math.round(done()/stages.length*100);pct.textContent=p+'%';bar.style.width=p+'%';let en=need();home.innerHTML=`<h2>Project Dashboard</h2><div class='grid'><div><h3>${V()[1]}</h3><p>${V()[3]} · ${V()[4]}</p></div><div><h3>${M()[1]}</h3><p>${done()} of ${stages.length} stages complete.</p></div><div><h3>Evidence</h3><p>${en.h} / ${en.r} required evidence points captured. ${en.p}%</p></div></div><div class='voice'><h3>Workshop Assistant Ready</h3><p>Prototype command set: Next, Back, Repeat, Torque, Diagram, Photo, Note, Finished.</p></div><div class='notice'>Phase 2 layout is now focused on release: fewer taps, clearer cards, and a more practical mechanic workflow.</div>`;garage.innerHTML=`<h2>Garage Mode 2.0</h2><p class='muted'>Timeline above, active stage below. Instructions stay left; evidence, torque and actions stay right.</p>${timeline()}<p><button onclick='prevStage()'>Back</button> <button class='primary' onclick='nextStage()'>Next</button></p>${stageCard(stages[st.current],st.current)}<div class='side-panels'><div class='panel'><h3>Whilst You’re There</h3>${wy.map(w=>`<div class='job'><b>${w[0]}</b><p class='muted'>${w[1]}</p></div>`).join('')}</div><div class='panel'><h3>Parts Panel</h3><p><b>Budget</b> · approved value option</p><p><b>Recommended</b> · best balance</p><p><b>Premium</b> · OEM/premium aftermarket</p></div><div class='panel'><h3>Voice Commands</h3><span class='pill'>Next</span><span class='pill'>Repeat</span><span class='pill'>Torque</span><span class='pill'>Photo</span><span class='pill'>Note</span></div></div>`;voice.innerHTML=`<h2>Workshop Voice</h2><div class='voice'><h3>Hands-free workflow</h3><span class='cmd'>Next</span><span class='cmd'>Back</span><span class='cmd'>Repeat</span><span class='cmd'>Torque</span><span class='cmd'>Tools</span><span class='cmd'>Parts</span><span class='cmd'>Take photo</span><span class='cmd'>Add note</span><span class='cmd'>Finished</span></div><p class='muted'>This is the planned voice command layer. It will move between stages, read instructions aloud, open camera capture and record technician notes without touching the screen.</p>`;evidence.innerHTML=`<h2>Pragmatic Evidence Protocol</h2><div class='job'><b>Prepare tools/workspace</b><p>No photos required.</p></div><div class='job'><b>Gain access</b><p>Before + after only. The after image becomes the repair before-image.</p></div><div class='job'><b>Carry out service/repair</b><p>Linked before + after. Optional extras only when useful.</p></div><div class='job'><b>Inspect related components</b><p>During photo per extra part inspected. Use Add picture for each item.</p></div><div class='job'><b>Reassemble</b><p>After photo only.</p></div><div class='job'><b>Road test/final check</b><p>No mandatory photo. Use notes and follow-up checks.</p></div>`;parts.innerHTML=`<h2>Curated Parts</h2><p>No pop-ups. Three clear choices only.</p><div class='three'><div class='part'><h3>Budget</h3><p>Approved low-cost option.</p></div><div class='part'><h3>Recommended</h3><p>Best value for most repairs.</p></div><div class='part'><h3>Premium</h3><p>OEM or premium aftermarket; sponsored only if quality criteria are met.</p></div></div>`;community.innerHTML=`<h2>Community</h2><div class='grid'><div class='part'><h3>Official Club Event</h3><p>Recognised club or organisation.</p></div><div class='part'><h3>Verified Community Event</h3><p>Organiser checked.</p></div><div class='part'><h3>Private Meet</h3><p>Grassroots enthusiast meet.</p></div><div class='part'><h3>Technical Day</h3><p>Workshop learning day.</p></div><div class='part'><h3>Workshop Open Day</h3><p>Garage-hosted event.</p></div><div class='part'><h3>Parts Swap</h3><p>Tools and spares meet.</p></div></div>`;feedback.innerHTML=`<h2>Suggest Update</h2><select id='fbtype'><option>Improve this job</option><option>Suggest a new job</option><option>Suggest a change with reason</option><option>Report conflict / variant difference</option><option>Other</option></select><textarea id='fbtext' placeholder='What should change and why?'></textarea><button onclick="st.feedback.push({type:fbtype.value,text:fbtext.value,module:M()[1],vehicle:V()[1],date:new Date().toLocaleDateString()});fbtext.value='';save()">Save suggestion</button><h3>Saved suggestions</h3>${st.feedback.length?st.feedback.slice().reverse().map(f=>`<div class='job'><b>${f.type}</b><p>${f.text}</p><p class='muted'>${f.module} · ${f.vehicle} · ${f.date}</p></div>`).join(''):'<p>No suggestions yet.</p>'}`;passport.innerHTML=`<h2>Vehicle Passport</h2>${st.pass.length?st.pass.slice().reverse().map(p=>`<div class='job'><b>${p.step}</b><p class='muted'>${p.d} · ${p.type} · ${p.job} · ${p.car}</p></div>`).join(''):'<p>No entries yet.</p>'}`}document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');['home','garage','voice','evidence','parts','community','feedback','passport'].forEach(id=>document.getElementById(id).classList.add('hidden'));document.getElementById(b.dataset.t).classList.remove('hidden')});render();</script></body></html>
