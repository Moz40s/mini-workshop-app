<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Project Piston v14</title><style>body{margin:0;background:#eef0f3;color:#111827;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif}.wrap{max-width:1240px;margin:auto;padding:18px}.hero{background:#111827;color:#fff;border-radius:28px;padding:26px;box-shadow:0 16px 40px #0002}.hero p{color:#d1d5db}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:20px;padding:16px;box-shadow:0 8px 24px #0001;margin:14px 0}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0}.tab{border:0;background:#fff;border-radius:999px;padding:10px 14px;box-shadow:0 4px 14px #0001}.active{background:#111827!important;color:#fff}.hidden{display:none}.muted{color:#6b7280}.stat{font-size:34px;font-weight:800}select,textarea{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:12px;font:inherit}.pill{display:inline-block;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:12px;padding:4px 8px;margin:2px}.warn{background:#fff7ed;color:#9a3412}.ok{background:#dcfce7;color:#166534}.danger{background:#fee2e2;color:#991b1b}.state{background:#ecfeff;color:#155e75;border:1px solid #a5f3fc}.progress{height:12px;background:#e5e7eb;border-radius:999px;overflow:hidden}.progress span{display:block;height:100%;background:#111827}.notice{background:#fff7ed;border:1px solid #fed7aa;border-radius:14px;padding:12px;color:#9a3412}.three{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.part,.panel{border:1px solid #e5e7eb;border-radius:16px;padding:12px;background:#fff}button{cursor:pointer;border:1px solid #d1d5db;background:#fff;border-radius:12px;padding:9px 12px}.primary{background:#111827;color:#fff}.linked{background:#ecfdf5;border:1px solid #bbf7d0;color:#166534}.stage-card{border:1px solid #d6dbe3;border-radius:22px;padding:16px;margin:16px 0;background:#fff;box-shadow:0 10px 28px #0000000d}.stage-layout{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:16px;align-items:start}.instruction-box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:16px;padding:14px}.evidence-box{background:#f8fafc;border:1px solid #dbeafe;border-radius:16px;padding:14px;position:sticky;top:12px}.stage-title{display:flex;align-items:center;justify-content:space-between;gap:10px}.evidence-actions{display:grid;grid-template-columns:1fr;gap:8px}.small{font-size:13px}.timeline{display:flex;gap:10px;overflow:auto;padding:8px 0}.dot{min-width:170px;border:1px solid #e5e7eb;background:#fff;border-radius:16px;padding:10px}.dot.done{border-color:#86efac;background:#f0fdf4}.dot.current{border-color:#fde68a;background:#fffbeb}.side-panels{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin:14px 0}.job{border-bottom:1px solid #eee;padding:14px 0}.instruction-list{padding-left:20px}.statebar{background:#ecfeff;border:1px solid #a5f3fc;color:#155e75;border-radius:16px;padding:12px;margin:12px 0}.tool-owned{border-left:5px solid #16a34a}.tool-missing{border-left:5px solid #f59e0b}@media(max-width:900px){.three,.stage-layout{grid-template-columns:1fr}.evidence-box{position:static}}</style></head><body><div class="wrap"><section class="hero"><h1>Project Piston</h1><p>v14 adds Vehicle State Engine: no repeated raise/lower instructions, safer sequencing, and clearer workflow state.</p></section><div class="grid"><div class="card"><div class="muted">Vehicle</div><select id="veh"></select><p id="vehInfo" class="muted"></p></div><div class="card"><div class="muted">Job module</div><select id="mod"></select><p id="modInfo" class="muted"></p></div><div class="card"><div class="muted">Progress</div><div class="stat" id="pct">0%</div><div class="progress"><span id="bar"></span></div></div></div><nav class="tabs"><button class="tab active" data-t="home">Dashboard</button><button class="tab" data-t="garage">Garage Mode</button><button class="tab" data-t="states">Vehicle States</button><button class="tab" data-t="builder">Workshop Builder</button><button class="tab" data-t="passport">Vehicle Passport</button></nav><main id="home" class="card"></main><main id="garage" class="card hidden"></main><main id="states" class="card hidden"></main><main id="builder" class="card hidden"></main><main id="passport" class="card hidden"></main></div><script>const vehicles=[['r50-one','R50 MINI One','Hatchback','W10','Naturally aspirated',0],['r50-cooper','R50 MINI Cooper','Hatchback','W10','Naturally aspirated',0],['r52-cooper','R52 MINI Cooper Convertible','Convertible','W10','Naturally aspirated',0],['r52-cooper-s','R52 MINI Cooper S Convertible','Convertible','W11','Eaton M45 supercharged',1],['r53-cooper-s','R53 MINI Cooper S Hatchback','Hatchback','W11','Eaton M45 supercharged',1]];const mods=[['standard','Annual Service','Engine / Service',0],['auxbelt','Auxiliary Belt Replacement','Drive Belt / Platform Tool',0],['timing','Timing Chain Replacement','Engine / Timing',0],['sump','Sump & Oil Pickup Clean','Lubrication',0],['supercharger','Supercharger Oil Service','Supercharger / Cooling',1],['waterpump','Water Pump Replacement','Cooling',0],['thermostat','Thermostat Replacement','Cooling',0],['gearbox','Gearbox Oil Service','Transmission',0]];const tools={torque:{name:'Torque wrench',price:'£25–£120'},belttool:{name:'MINI serpentine belt tool',price:'£15–£35'},oilfilter:{name:'Oil filter cap socket',price:'£8–£20'},spark:{name:'Spark plug socket',price:'£6–£20'},stands:{name:'Jack and axle stands',price:'£60–£180'},support:{name:'Engine support beam',price:'£55–£160'},timingkit:{name:'W11 timing locking kit',price:'£40–£120'}};const moduleData={standard:{pack:['Engine oil','Oil filter','Oil filter seal','Air filter','Cabin filter','Spark plugs if due','Drain plug washer/seal'],tools:['torque','oilfilter','spark','stands'],states:[{state:'Vehicle on ground',transition:'Start on firm level ground. Interior and engine-bay tasks should be carried out with the car safely on the ground.',tasks:['Prepare parts and tools','Replace cabin filter','Replace air filter','Replace spark plugs if due','Open oil filler cap'],evidence:[]},{state:'Vehicle raised',transition:'Raise vehicle once for underside work only. Use safe lifting points and axle stands.',tasks:['Drain engine oil','Inspect underside while oil drains','Inspect brakes, bushes, CV boots, exhaust and leaks'],evidence:['before','after']},{state:'Vehicle lowered',transition:'Lower vehicle before refilling oil and working inside/engine bay final checks.',tasks:['Replace oil filter and seal','Refill engine oil','Start engine and check oil pressure light','Reset service record','Road test and recheck level'],evidence:['after']}],validation:['Cabin filter is explicitly ground-state only.','Raise vehicle appears only once for underside work.','Confirm preferred annual service order after feel-test.']},auxbelt:{pack:['Serpentine belt','Optional tensioner/idler if worn'],tools:['belttool','torque','stands'],states:[{state:'Vehicle on ground',transition:'Prepare the belt tool and record the job before lifting.',tasks:['Confirm belt type','Prepare MINI serpentine belt tool','Open bonnet and inspect visible belt condition'],evidence:[]},{state:'Vehicle raised / access opened',transition:'Raise vehicle only if required for access. Remove wheel arch liner/access panel once.',tasks:['Record belt routing','Fit belt tool','Release tensioner','Remove serpentine belt'],evidence:['before','after']},{state:'Belt system exposed',transition:'Belt is off. Linked jobs can inherit this state.',tasks:['Inspect tensioner, idlers, pulleys and crank pulley','Add extra photos for each fault found'],evidence:['during','extra']},{state:'Vehicle reassembled',transition:'Fit new belt, lower vehicle if raised, then test.',tasks:['Fit belt and confirm routing','Start engine and observe belt tracking','Record final notes'],evidence:['after']}],validation:['Confirm belt routing check method.','Confirm common belt tool mistakes.']},timing:{pack:['Timing chain kit','Hydraulic tensioner','Engine oil','Oil filter','Front crank seal recommended','Sealant/gaskets'],tools:['belttool','support','timingkit','torque','stands','oilfilter'],states:[{state:'Vehicle on ground',transition:'Initial preparation with vehicle stable on the ground.',tasks:['Prepare timing tools, oil service parts and labelled bolt trays','Disconnect battery if required','Confirm engine is cool'],evidence:[]},{state:'Vehicle raised / RH arch access',transition:'Raise once and remove RH wheel arch liner for timing-side access.',tasks:['Remove RH wheel if required','Remove inner plastic wheel arch liner','Drain engine oil'],evidence:['before','after']},{state:'Engine supported',transition:'Support engine before removing RH engine mount.',tasks:['Fit engine support beam','Remove RH engine mount','Remove serpentine belt using MINI belt tool'],evidence:['after']},{state:'Timing exposed',transition:'Timing system is accessible. Linked jobs inherit this state where relevant.',tasks:['Remove crank pulley as required','Lock crank and camshaft','Replace chain, guides and tensioner','Inspect guide damage and debris risk'],evidence:['during','extra']},{state:'Reassembly / oil service',transition:'Reassemble and complete mandatory oil service.',tasks:['Reassemble timing area','Replace oil filter','Refill engine oil','Check leaks and oil pressure light'],evidence:['after']},{state:'Road test',transition:'Vehicle back on ground for final checks.',tasks:['Road test','Recheck oil level','Save Vehicle Passport record'],evidence:[]}],validation:['Engine support required.','Oil drain and oil filter required minimum.','Sump inspection conditional for debris/oil pressure/unknown history.']}};function getData(){return moduleData[st.m]||moduleData.standard}let st=JSON.parse(localStorage.projectPistonV14||localStorage.projectPistonV13||'{}');st.v=st.v||'r52-cooper-s';st.m=st.m||'standard';st.current=st.current||0;st.done=st.done||{};st.evidence=st.evidence||{};st.pass=st.pass||[];st.tools=st.tools||{};veh.innerHTML=vehicles.map(v=>`<option value='${v[0]}'>${v[1]} · ${v[2]} · ${v[3]} · ${v[4]}</option>`).join('');function V(){return vehicles.find(v=>v[0]==st.v)||vehicles[3]}function A(){return mods.filter(m=>!m[3]||V()[5])}function M(){return A().find(m=>m[0]==st.m)||A()[0]}function states(){return getData().states}function save(){localStorage.projectPistonV14=JSON.stringify(st);render()}veh.onchange=()=>{st.v=veh.value;save()};mod.onchange=()=>{st.m=mod.value;st.current=0;save()};function k(i){return st.m+'-'+i}function done(){return states().filter((_,i)=>st.done[k(i)]).length}function ev(i,t){return st.evidence[k(i)+'-'+t]||0}function capture(i,t){st.evidence[k(i)+'-'+t]=(st.evidence[k(i)+'-'+t]||0)+1;st.pass.push({d:new Date().toLocaleDateString(),job:M()[1],step:states()[i].state,type:'Evidence '+t,car:V()[1]});save()}function req(i){return states()[i].evidence.filter(x=>x!='extra')}function verified(i){return req(i).every(t=>ev(i,t)>0)}function list(a){return '<ul class="instruction-list">'+a.map(x=>`<li>${x}</li>`).join('')+'</ul>'}function evidenceActions(i){let e=states()[i].evidence;if(!e.length)return '<p class="muted small">No photo evidence required for this vehicle state.</p>';let out='';['before','during','after'].forEach(t=>{if(e.includes(t))out+=`<button onclick="capture(${i},'${t}')">${t[0].toUpperCase()+t.slice(1)} photo (${ev(i,t)})</button>`});if(e.includes('extra'))out+=`<button class='primary' onclick="capture(${i},'extra')">Add picture (${ev(i,'extra')})</button>`;return `<div class='evidence-actions'>${out}</div>`}function mark(i){st.done[k(i)]=!st.done[k(i)];if(st.done[k(i)])st.pass.push({d:new Date().toLocaleDateString(),job:M()[1],step:states()[i].state,type:'State completed',car:V()[1]});save()}function next(){st.current=Math.min(states().length-1,st.current+1);save()}function back(){st.current=Math.max(0,st.current-1);save()}function readiness(){let ids=Object.keys(tools), have=ids.filter(id=>st.tools[id]).length;return Math.round(have/ids.length*100)}function toggleTool(id){st.tools[id]=!st.tools[id];save()}function timeline(){return `<div class='timeline'>${states().map((s,i)=>`<div class='dot ${st.done[k(i)]?'done':''} ${i==st.current?'current':''}' onclick='st.current=${i};save()'><b>${s.state}</b><p class='small muted'>${st.done[k(i)]?'Complete':(i==st.current?'Current':'Pending')}</p></div>`).join('')}</div>`}function stateCard(s,i){return `<section class='stage-card'><div class='stage-title'><div><h3>${s.state}</h3><p class='muted'>${s.transition}</p></div><span class='pill state'>Vehicle State</span></div><div class='stage-layout'><div class='instruction-box'><h4>Tasks in this state</h4>${list(s.tasks)}<h4>Safety / logic</h4><p>${s.transition}</p><textarea placeholder='Technician notes for this vehicle state...'></textarea></div><aside class='evidence-box'><h4>Evidence</h4>${evidenceActions(i)}<hr><button onclick='mark(${i})'>${st.done[k(i)]?'Mark state undone':'Mark state complete'}</button></aside></div></section>`}function render(){veh.value=st.v;vehInfo.textContent=`${V()[2]} · ${V()[3]} · ${V()[4]}`;mod.innerHTML=A().map(m=>`<option value='${m[0]}'>${m[1]}</option>`).join('');mod.value=st.m;modInfo.textContent=M()[2];let p=Math.round(done()/states().length*100);pct.textContent=p+'%';bar.style.width=p+'%';home.innerHTML=`<h2>Vehicle State Engine</h2><div class='grid'><div><h3>${V()[1]}</h3><p>${V()[3]} · ${V()[4]}</p></div><div><h3>${M()[1]}</h3><p>${done()} of ${states().length} vehicle states complete.</p></div><div><h3>Workshop Readiness</h3><p>${readiness()}%</p></div></div><div class='notice'>Annual service now keeps cabin filter/interior work on the ground. The car is raised once for underside work, then lowered for refill/final checks.</div>`;garage.innerHTML=`<h2>Garage Mode</h2><div class='statebar'><b>Current vehicle state:</b> ${states()[st.current].state}<p>${states()[st.current].transition}</p></div><div class='side-panels'><div class='panel'><h3>Job Pack</h3>${list(getData().pack)}</div><div class='panel'><h3>Required Tools</h3>${list(getData().tools.map(id=>tools[id].name))}</div><div class='panel'><h3>Validation Flags</h3>${list(getData().validation)}</div></div>${timeline()}<p><button onclick='back()'>Back</button> <button class='primary' onclick='next()'>Next State</button></p>${stateCard(states()[st.current],st.current)}`;states_el=states;states.innerHTML=`<h2>Vehicle States</h2>${states().map((s,i)=>`<div class='job'><b>${i+1}. ${s.state}</b><p>${s.transition}</p>${list(s.tasks)}</div>`).join('')}`;builder.innerHTML=`<h2>Workshop Builder</h2><h3>Readiness: ${readiness()}%</h3><div class='progress'><span style='width:${readiness()}%'></span></div><div class='grid'>${Object.keys(tools).map(id=>`<div class='part ${st.tools[id]?'tool-owned':'tool-missing'}'><h3>${tools[id].name}</h3><p>${tools[id].price}</p><button onclick="toggleTool('${id}')">${st.tools[id]?'Owned ✓':'Mark owned'}</button></div>`).join('')}</div>`;passport.innerHTML=`<h2>Vehicle Passport</h2>${st.pass.length?st.pass.slice().reverse().map(p=>`<div class='job'><b>${p.step}</b><p class='muted'>${p.d} · ${p.type} · ${p.job} · ${p.car}</p></div>`).join(''):'<p>No entries yet.</p>'}`}document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');['home','garage','states','builder','passport'].forEach(id=>document.getElementById(id).classList.add('hidden'));document.getElementById(b.dataset.t).classList.remove('hidden')});render();</script></body></html>
