<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MINI Workshop</title><style>:root{font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;background:#f3f4f6;color:#111827}body{margin:0}.wrap{max-width:1120px;margin:auto;padding:18px}.hero{background:#111827;color:#fff;border-radius:24px;padding:24px;box-shadow:0 10px 30px #0002}.hero h1{margin:0 0 8px}.sub{color:#d1d5db}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin:14px 0}.card{background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:16px;box-shadow:0 8px 24px #0001}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0}.tab{border:0;background:#fff;border-radius:999px;padding:10px 14px;box-shadow:0 4px 14px #0001}.tab.active{background:#111827;color:#fff}.hidden{display:none}.muted{color:#6b7280}.stat{font-size:34px;font-weight:800}.pill{display:inline-block;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:12px;padding:4px 8px;margin:2px}.warn{background:#fff7ed;color:#9a3412}.danger{background:#fee2e2;color:#991b1b}.ok{background:#dcfce7;color:#166534}.job,.step{display:flex;gap:12px;border-bottom:1px solid #eee;padding:12px 0}.job:last-child,.step:last-child{border-bottom:0}.step input{width:auto;transform:scale(1.2);margin-top:5px}select,input{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:12px;font:inherit}.progress{height:12px;background:#e5e7eb;border-radius:99px;overflow:hidden}.progress span{display:block;height:100%;background:#111827}.notice{background:#fff7ed;border:1px solid #fed7aa;border-radius:14px;padding:12px;color:#9a3412}@media(max-width:700px){.hero h1{font-size:24px}}</style></head><body><div class="wrap"><section class="hero"><h1>MINI Workshop</h1><p class="sub">Hosted preview for R50, R52 and R53 service planning, Garage Mode and Vehicle Passport logging.</p></section><div class="grid"><div class="card"><div class="muted">Select your MINI</div><select id="vehicle"></select><p id="vehicleInfo" class="muted"></p></div><div class="card"><div class="muted">Job module</div><select id="module"></select><p id="moduleInfo" class="muted"></p></div><div class="card"><div class="muted">Reliability score</div><div class="stat" id="score">72%</div><div class="progress"><span id="scorebar" style="width:72%"></span></div></div></div><nav class="tabs"><button class="tab active" data-t="home">Home</button><button class="tab" data-t="workshop">Workshop</button><button class="tab" data-t="garage">Garage Mode</button><button class="tab" data-t="whilst">Whilst You're There</button><button class="tab" data-t="knowledge">Knowledge</button><button class="tab" data-t="passport">Vehicle Passport</button></nav><main id="home" class="card"></main><main id="workshop" class="card hidden"></main><main id="garage" class="card hidden"></main><main id="whilst" class="card hidden"></main><main id="knowledge" class="card hidden"></main><main id="passport" class="card hidden"></main></div><script>const vehicles=[['r50-one','R50 MINI One','Hatchback','W10','Naturally aspirated',0],['r50-cooper','R50 MINI Cooper','Hatchback','W10','Naturally aspirated',0],['r52-cooper','R52 MINI Cooper Convertible','Convertible','W10','Naturally aspirated',0],['r52-cooper-s','R52 MINI Cooper S Convertible','Convertible','W11','Eaton M45 supercharged',1],['r53-cooper-s','R53 MINI Cooper S Hatchback','Hatchback','W11','Eaton M45 supercharged',1]];const mods=[{id:'standard',t:'Standard Annual Service',sys:'Engine / Service',ap:'all',d:'★☆☆☆☆',time:'1–2 hours',cost:'£60–£160',impact:8,ov:'Baseline annual service: oil, oil filter, air filter, cabin filter, spark plugs and general inspection.',why:['Annual service due','Unknown history','Newly purchased MINI'],tools:['Oil filter socket','Spark plug socket','Drain pan','Basic inspection tools'],parts:['Engine oil','Oil filter','Air filter','Cabin filter','Spark plugs'],steps:['Inspect vehicle first','Drain engine oil','Replace oil filter','Refill oil','Replace air filter','Replace cabin filter','Replace spark plugs','General inspection','Road test'],wy:[['Throttle body clean','Medium'],['MAP sensor clean','Medium'],['Brake fluid check','High']],kn:'A standard service gives a known baseline. Many running faults are easier to diagnose once basic service items are fresh.'},{id:'timing',t:'Timing Chain Replacement',sys:'Engine / Timing / Lubrication',ap:'all',d:'★★★★★',time:'8–10 hours',cost:'£120–£350',impact:18,ov:'Replaces timing chain, guides and tensioner. If guide debris is present, sump and oil pickup cleaning becomes critical.',why:['Cold start rattle','Timing end noise','Guide debris in oil','Cam/crank correlation faults'],tools:['Cam locking tool','Crank locking tool','Crank pulley puller','Torque wrench','E-torx sockets'],parts:['Timing chain','Guides','Tensioner','Cam seals','Crank seal','Oil and filter'],steps:['Prepare tools and parts','Disconnect battery','Create front-end access','Remove auxiliary belt','Remove crank pulley','Remove valve cover','Lock crank and camshaft','Remove old chain and guides','Inspect debris risk','Fit new chain and guides','Fit/prime tensioner','Replace accessible seals','Refill oil','Initial start and leak check','Road test'],wy:[['Sump removal and oil pickup clean','Critical'],['Camshaft seals','High'],['Front crankshaft seal','High'],['Crank pulley','High'],['Auxiliary belt','High'],['Second oil and filter change','High']],kn:'Timing guide material can break up and collect in the sump. This is why timing chain work and oil pickup inspection often belong together.'},{id:'sump',t:'Sump Removal & Oil Pickup Clean',sys:'Lubrication / Engine',ap:'all',d:'★★★★☆',time:'5–6 hours',cost:'£45–£90 plus oil/filter',impact:16,ov:'Removes sump, cleans oil pickup and checks for plastic guide fragments, sludge or metallic debris.',why:['Oil light flicker','Known guide debris','Debris in oil filter'],tools:['Socket set','E-torx sockets','Brake cleaner','Scraper','Drain pan'],parts:['Oil','Oil filter','Sump sealant/gasket','Pickup seal if required'],steps:['Drain oil','Remove sump fixings','Lower sump carefully','Inspect sump','Clean pickup mesh','Inspect pickup pipe/seal','Clean mating faces','Refit sump','Refill oil','Check for leaks'],wy:[['Oil pump inspection','High'],['Timing chain inspection','High'],['Second oil and filter change','High']],kn:'A restricted pickup can reduce oil supply, especially at hot idle. Cleaning it after guide failure protects the engine.'},{id:'supercharger',t:'Supercharger Oil Service',sys:'Supercharger / Cooling',ap:'sc',d:'★★★★☆',time:'3–4 hours',cost:'£25–£90',impact:14,ov:'Services front and rear oil chambers on W11 supercharged Cooper S models.',why:['Unknown history','High-mileage Cooper S','Supercharger noise'],tools:['Socket set','Syringe/suction tool','Measuring container','Cleaner'],parts:['Correct supercharger oil','Gaskets/seals if required','Intercooler boot clamps if needed'],steps:['Confirm W11 engine','Create access','Remove supercharger as needed','Drain front chamber','Refill front chamber','Drain rear chamber','Refill rear chamber','Inspect coupler and nose','Inspect bypass valve','Clean intercooler/boots','Reassemble and test'],wy:[['Water pump','High'],['Thermostat','Medium'],['Coolant flush','High'],['Auxiliary belt','High'],['Intercooler clean','Medium']],kn:'The Eaton M45 uses oil separate from engine oil. Preventative servicing is sensible when history is unknown.'},{id:'waterpump',t:'Water Pump Replacement',sys:'Cooling',ap:'all',d:'★★★☆☆',time:'2–3 hours',cost:'£35–£90',impact:10,ov:'Replaces the water pump to protect cooling reliability.',why:['Coolant leak','Overheating','Noisy pump','Unknown history'],tools:['Socket set','Drain pan','Torque wrench'],parts:['Water pump','Seal/gasket','Coolant'],steps:['Drain coolant','Create access','Remove old pump','Clean mating face','Fit new pump','Refill coolant','Bleed system','Road test and recheck'],wy:[['Thermostat','Medium'],['Coolant flush','High'],['Supercharger service on W11','High']],kn:'Cooling work should always end with careful bleeding and a level check after heat cycling.'},{id:'gearbox',t:'Gearbox Oil Service',sys:'Transmission',ap:'all',d:'★★☆☆☆',time:'45–60 min',cost:'£25–£60',impact:7,ov:'Refreshes gearbox oil, often neglected on older MINIs.',why:['Notchy shift','Unknown oil history','High mileage'],tools:['Drain/fill tools','Fluid pump','Drain pan'],parts:['Correct gearbox oil','Washers if required'],steps:['Confirm oil specification','Check fill plug opens','Drain old oil','Inspect old oil','Refit drain plug','Fill to correct level','Refit fill plug','Road test'],wy:[['Driveshaft boot inspection','Medium'],['Gearbox mount inspection','Medium'],['Clutch slave inspection','Medium']],kn:'Always confirm the fill plug opens before draining. Correct oil specification matters.'},{id:'evap',t:'EVAP Purge / Idle Diagnosis',sys:'Fuel / Emissions / Idle',ap:'all',d:'★★☆☆☆',time:'30–90 min',cost:'Inspect–£80',impact:6,ov:'Checks purge valve, charcoal canister and vacuum/vent lines for warm idle hunting and purge faults.',why:['Warm idle hunting','Fuel vapour smell','Idle improves with purge valve disconnected'],tools:['Scan tool','Vacuum pump if available','Smoke tester if available'],parts:['Purge valve if faulty','Vacuum hose','Canister if saturated'],steps:['Confirm symptom pattern','Inspect hoses and connectors','Test purge valve','Check canister route','Scan fuel trims','Repair and retest idle'],wy:[['Throttle body clean','Medium'],['MAP sensor clean','Medium'],['Vacuum smoke test','High']],kn:'A purge valve stuck open can disturb idle mixture once the ECU commands purge operation.'}];let state=JSON.parse(localStorage.miniWorkshopPreview||'{}');state.v=state.v||'r52-cooper-s';state.m=state.m||'standard';state.steps=state.steps||{};state.passport=state.passport||[];vehicle.innerHTML='<option>Select your MINI</option>'+vehicles.map(v=>`<option value="${v[0]}">${v[1]} · ${v[2]} · ${v[3]} · ${v[4]}</option>`).join('');function V(){return vehicles.find(v=>v[0]==state.v)||vehicles[3]}function available(){return mods.filter(m=>m.ap=='all'||(m.ap=='sc'&&V()[5]))}function M(){return available().find(m=>m.id==state.m)||available()[0]}function k(i){return M().id+'-'+i}function progress(){return M().steps.filter((_,i)=>state.steps[k(i)]).length}function save(){localStorage.miniWorkshopPreview=JSON.stringify(state);render()}vehicle.onchange=()=>{state.v=vehicle.value;if(!available().some(m=>m.id==state.m))state.m=available()[0].id;save()};module.onchange=()=>{state.m=module.value;save()};function c(level){return level=='Critical'?'danger':level=='High'?'warn':'ok'}function add(title,type){state.passport.push({date:new Date().toLocaleDateString(),vehicle:V()[1],module:M().t,title,type})}function render(){vehicle.value=state.v;vehicleInfo.textContent=`${V()[2]} · ${V()[3]} · ${V()[4]}`;module.innerHTML=available().map(m=>`<option value="${m.id}">${m.t}</option>`).join('');module.value=M().id;moduleInfo.textContent=`${M().sys} · ${M().d} · ${M().time}`;let sc=Math.min(98,72+Math.round(progress()/M().steps.length*M().impact));score.textContent=sc+'%';scorebar.style.width=sc+'%';home.innerHTML=`<h2>Home</h2><div class="grid"><div><h3>Your MINI</h3><p><b>${V()[1]}</b><br>${V()[3]} · ${V()[4]}</p></div><div><h3>Current module</h3><p><b>${M().t}</b><br>${progress()} of ${M().steps.length} steps complete.</p></div><div><h3>Next action</h3><p>${(M().steps.find((_,i)=>!state.steps[k(i)])||'Module complete')}</p></div></div><div class="notice">Hosted preview. Torque values and exact specs are intentionally verification-required.</div>`;workshop.innerHTML=`<h2>${M().t}</h2><p class="muted">${M().ov}</p><div><span class="pill">${M().sys}</span><span class="pill ${M().d=='★★★★★'?'danger':'warn'}">${M().d}</span><span class="pill">${M().time}</span><span class="pill">${M().cost}</span></div><div class="grid"><div><h3>Symptoms / reasons</h3><ul>${M().why.map(x=>`<li>${x}</li>`).join('')}</ul></div><div><h3>Tools</h3><ul>${M().tools.map(x=>`<li>${x}</li>`).join('')}</ul></div><div><h3>Parts</h3><ul>${M().parts.map(x=>`<li>${x}</li>`).join('')}</ul></div></div><h3>Torque settings</h3><p class="notice">Verification required against workshop data for exact model, engine and year.</p>`;garage.innerHTML=`<h2>Garage Mode</h2><p class="muted">Tick steps as you work. Entries are added to the Vehicle Passport.</p><p><b>${progress()} / ${M().steps.length}</b></p><div class="progress"><span style="width:${Math.round(progress()/M().steps.length*100)}%"></span></div>${M().steps.map((s,i)=>`<div class="step"><input type="checkbox" ${state.steps[k(i)]?'checked':''} onchange="state.steps['${k(i)}']=this.checked;if(this.checked)add('${s}','Step completed');save()"><div><strong>${i+1}. ${s}</strong><p class="muted">Complete and inspect before moving on.</p></div></div>`).join('')}<p><button class="primary" onclick="M().steps.forEach((_,i)=>state.steps[k(i)]=true);add(M().t,'Module completed');save()">Complete module</button></p>`;whilst.innerHTML=`<h2>Whilst You're There</h2>${M().wy.map(w=>`<div class="job"><div><strong>${w[0]}</strong><br><span class="pill ${c(w[1])}">${w[1]}</span></div></div>`).join('')}`;knowledge.innerHTML=`<h2>Knowledge</h2><p>${M().kn}</p><p class="muted">Next: expand each module with photos, torque values, part numbers and guided diagnostics.</p>`;passport.innerHTML=`<h2>Vehicle Passport</h2><p class="muted">Vehicle service history only. No personal/customer data transfers.</p>${state.passport.length?state.passport.slice().reverse().map(p=>`<div class="job"><div><strong>${p.title}</strong><p class="muted">${p.date} · ${p.type} · ${p.module} · ${p.vehicle}</p></div></div>`).join(''):'<p>No entries yet.</p>'}<p><button class="secondary" onclick="state.passport=[];save()">Clear demo passport</button></p>`}document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');['home','workshop','garage','whilst','knowledge','passport'].forEach(id=>document.getElementById(id).classList.add('hidden'));document.getElementById(b.dataset.t).classList.remove('hidden')});render();</script></body></html>
