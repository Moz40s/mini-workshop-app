<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Project Piston Sprint 3</title><style>body{margin:0;background:#eef0f3;color:#111827;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif}.wrap{max-width:1240px;margin:auto;padding:18px}.hero{background:#111827;color:#fff;border-radius:28px;padding:26px;box-shadow:0 16px 40px #0002}.hero p{color:#d1d5db}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:20px;padding:16px;box-shadow:0 8px 24px #0001;margin:14px 0}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0}.tab{border:0;background:#fff;border-radius:999px;padding:10px 14px;box-shadow:0 4px 14px #0001}.active{background:#111827!important;color:#fff}.hidden{display:none}.muted{color:#6b7280}.stat{font-size:34px;font-weight:800}select,textarea{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:12px;font:inherit}.pill{display:inline-block;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:12px;padding:4px 8px;margin:2px}.warn{background:#fff7ed;color:#9a3412}.ok{background:#dcfce7;color:#166534}.danger{background:#fee2e2;color:#991b1b}.progress{height:12px;background:#e5e7eb;border-radius:999px;overflow:hidden}.progress span{display:block;height:100%;background:#111827}.notice{background:#fff7ed;border:1px solid #fed7aa;border-radius:14px;padding:12px;color:#9a3412}.three{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.part,.panel{border:1px solid #e5e7eb;border-radius:16px;padding:12px;background:#fff}button{cursor:pointer;border:1px solid #d1d5db;background:#fff;border-radius:12px;padding:9px 12px}.primary{background:#111827;color:#fff}.linked{background:#ecfdf5;border:1px solid #bbf7d0;color:#166534}.stage-card{border:1px solid #d6dbe3;border-radius:22px;padding:16px;margin:16px 0;background:#fff;box-shadow:0 10px 28px #0000000d}.stage-layout{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:16px;align-items:start}.instruction-box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:16px;padding:14px}.evidence-box{background:#f8fafc;border:1px solid #dbeafe;border-radius:16px;padding:14px;position:sticky;top:12px}.stage-title{display:flex;align-items:center;justify-content:space-between;gap:10px}.evidence-actions{display:grid;grid-template-columns:1fr;gap:8px}.small{font-size:13px}.voice{background:#111827;color:#fff;border-radius:20px;padding:16px}.voice .cmd{display:inline-block;background:#1f2937;color:#fff;border:1px solid #374151;border-radius:999px;padding:7px 10px;margin:4px}.timeline{display:flex;gap:10px;overflow:auto;padding:8px 0}.dot{min-width:160px;border:1px solid #e5e7eb;background:#fff;border-radius:16px;padding:10px}.dot.done{border-color:#86efac;background:#f0fdf4}.dot.current{border-color:#fde68a;background:#fffbeb}.side-panels{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin:14px 0}.job{border-bottom:1px solid #eee;padding:14px 0}.instruction-list{padding-left:20px}.returnbar{background:#ecfeff;border:1px solid #a5f3fc;color:#155e75;border-radius:16px;padding:12px;margin:12px 0}.wy-btn{display:block;width:100%;text-align:left;margin:8px 0;padding:10px;border-radius:12px}.tool-card{border-left:5px solid #111827}.tool-owned{border-left-color:#16a34a}.tool-missing{border-left-color:#f59e0b}@media(max-width:900px){.three,.stage-layout{grid-template-columns:1fr}.evidence-box{position:static}}</style></head><body><div class="wrap"><section class="hero"><h1>Project Piston</h1><p>Sprint 3 build: fuller Annual Service and Auxiliary Belt modules, Workshop Builder, tool readiness, and linked sub-jobs.</p></section><div class="grid"><div class="card"><div class="muted">Vehicle</div><select id="veh"></select><p id="vehInfo" class="muted"></p></div><div class="card"><div class="muted">Job module</div><select id="mod"></select><p id="modInfo" class="muted"></p></div><div class="card"><div class="muted">Progress</div><div class="stat" id="pct">0%</div><div class="progress"><span id="bar"></span></div></div></div><nav class="tabs"><button class="tab active" data-t="home">Dashboard</button><button class="tab" data-t="garage">Garage Mode 2.0</button><button class="tab" data-t="builder">Workshop Builder</button><button class="tab" data-t="voice">Workshop Voice</button><button class="tab" data-t="evidence">Evidence</button><button class="tab" data-t="parts">Parts</button><button class="tab" data-t="feedback">Suggest Update</button><button class="tab" data-t="passport">Vehicle Passport</button></nav><main id="home" class="card"></main><main id="garage" class="card hidden"></main><main id="builder" class="card hidden"></main><main id="voice" class="card hidden"></main><main id="evidence" class="card hidden"></main><main id="parts" class="card hidden"></main><main id="feedback" class="card hidden"></main><main id="passport" class="card hidden"></main></div><script>const vehicles=[['r50-one','R50 MINI One','Hatchback','W10','Naturally aspirated',0],['r50-cooper','R50 MINI Cooper','Hatchback','W10','Naturally aspirated',0],['r52-cooper','R52 MINI Cooper Convertible','Convertible','W10','Naturally aspirated',0],['r52-cooper-s','R52 MINI Cooper S Convertible','Convertible','W11','Eaton M45 supercharged',1],['r53-cooper-s','R53 MINI Cooper S Hatchback','Hatchback','W11','Eaton M45 supercharged',1]];const mods=[['standard','Annual Service','Engine / Service',0],['auxbelt','Auxiliary Belt Replacement','Drive Belt / Platform Tool',0],['timing','Timing Chain Replacement','Engine / Timing',0],['sump','Sump & Oil Pickup Clean','Lubrication',0],['supercharger','Supercharger Oil Service','Supercharger / Cooling',1],['waterpump','Water Pump Replacement','Cooling',0],['thermostat','Thermostat Replacement','Cooling',0],['crankseal','Front Crank Seal Replacement','Engine Sealing',0],['gearbox','Gearbox Oil Service','Transmission',0],['evap','EVAP Purge / Idle Diagnosis','Fuel / Emissions / Idle',0]];const tools={torque:{name:'Torque wrench',type:'Platform',unlocks:['Annual Service','Auxiliary Belt','Timing Chain','Water Pump','Brakes'],price:'£25–£120'},belttool:{name:'MINI serpentine belt tool',type:'Essential MINI platform tool',unlocks:['Auxiliary Belt','Timing Chain','Water Pump','Alternator','Supercharger Service','Crank Pulley'],price:'£15–£35'},oilfilter:{name:'Oil filter cap socket',type:'Service platform tool',unlocks:['Annual Service','Timing Chain oil service','Oil pressure work'],price:'£8–£20'},spark:{name:'Spark plug socket',type:'Service platform tool',unlocks:['Annual Service','Misfire Diagnosis','Compression Test'],price:'£6–£20'},stands:{name:'Jack and axle stands',type:'Core workshop safety',unlocks:['Most underbody repairs','Annual Service','Gearbox Oil'],price:'£60–£180'},support:{name:'Engine support beam',type:'Major engine support',unlocks:['Timing Chain','Engine Mount','Clutch overlap'],price:'£55–£160'},timingkit:{name:'W11 timing locking kit',type:'Specialist precision tool',unlocks:['Timing Chain'],price:'£40–£120'}};const moduleStages={standard:['Warm engine and prepare service area','Drain engine oil','Replace oil filter and seal','Inspect underside while oil drains','Replace air filter','Replace cabin filter','Replace spark plugs if due','Refill oil and leak check','Road test and service record'],auxbelt:['Prepare access and belt tool','Record belt routing','Release tensioner with MINI belt tool','Remove serpentine belt','Inspect tensioner, idlers and pulleys','Fit new belt and confirm routing','Start engine and observe belt tracking'],timing:['Prepare tools and workspace','Gain access / remove obstructing parts','Support engine and remove right engine mount','Remove serpentine belt and crank pulley','Lock timing','Replace timing chain and guides','Inspect related components','Reassemble carefully','Road test and final check'],sump:['Prepare oil service area','Drain oil','Remove sump','Clean oil pickup','Inspect related components','Refit sump and refill','Final leak check'],waterpump:['Prepare cooling system','Drain coolant','Gain access','Replace water pump','Inspect related components','Bleed cooling system','Heat cycle check'],default:['Prepare tools and workspace','Gain access / remove obstructing parts','Carry out service or repair','Inspect related components','Reassemble carefully','Road test and final check']};const moduleInfo={standard:{pack:['Engine oil','Oil filter','Oil filter seal','Air filter','Cabin filter','Spark plugs if due','Drain plug washer/seal'],tools:['torque','oilfilter','spark','stands'],opp:[['auxbelt','Auxiliary belt inspection','Inspection only during service'],['evap','EVAP idle check','Only if hunting or fuel vapour symptoms exist']],validation:['Confirm preferred service order in practice.','Confirm whether you replace the sump plug washer every oil service.','Confirm preferred spark plug brand/spec approach.']},auxbelt:{pack:['Serpentine belt','Optional tensioner/idler if worn'],tools:['belttool','torque','stands'],opp:[['waterpump','Water pump','Belt already removed but only worthwhile if symptoms/history support it'],['supercharger','Supercharger service','Useful W11 overlap if access is already expanded'],['crankseal','Crank pulley/crank seal inspection','Inspect while belt is off']],validation:['Confirm preferred belt routing check method.','Confirm whether tensioner should be proactive above a mileage.','Confirm common mistakes with the MINI belt tool.']},timing:{pack:['Timing chain kit','Hydraulic tensioner','Engine oil','Oil filter','Front crank seal recommended','Sealant/gaskets'],tools:['belttool','support','timingkit','torque','stands','oilfilter'],opp:[['sump','Sump clean','Conditional: guide damage, oil pressure issue, unknown prior repair'],['crankseal','Front crank seal','High opportunity while crank pulley is removed'],['auxbelt','Auxiliary belt','Required removal; replace if worn']],validation:['Access confirmed via wheel arch liner; full service mode not normally required.','Sump conditional rather than mandatory.','Water pump removed from default overlap.']}};function makeStages(id){let names=moduleStages[id]||moduleStages.default;return names.map((n,i)=>({id:id+'-'+i,name:n,evidence:i==0?[]:i==1?['before','after']:i==2?['linked-before','after']:i==3?['during','extra']:i==names.length-2?['after']:[],reason:i==0?'No photo evidence required.':i==1?'Before and after access photos.':i==2?'Uses access after-photo as linked before.':i==3?'Add photos where inspection findings matter.':i==names.length-2?'After photo confirms final assembly.':'Notes only.',instructions:stageInstructions(id,n),remove:['Only parts required for this stage; avoid unnecessary dismantling.'],tools:['Relevant platform tools shown in Job Pack.','Inspection light.','Torque wrench where specified.'],torque:'Verification required before commercial release.',why:'This stage builds a clean repair record without wasting workshop time.'}))}function stageInstructions(id,n){let d={standard:{'Warm engine and prepare service area':['Warm engine briefly so oil drains better; do not work around hot exhaust parts.','Set vehicle safely on level ground.','Prepare drain pan, oil filter tool and replacement parts.'],'Drain engine oil':['Remove oil filler cap.','Drain oil into suitable container.','Inspect old oil for metallic debris, coolant contamination or fuel smell.'],'Replace oil filter and seal':['Remove oil filter cap.','Replace filter and O-ring/seal.','Lubricate new seal with clean oil before refitting.'],'Inspect underside while oil drains':['Check CV boots, ball joints, wishbone bushes, brake hoses, exhaust, leaks and corrosion.','Note any advisory items in Vehicle Passport.'],'Replace air filter':['Open airbox, remove filter and clean leaves/debris.','Confirm filter seats correctly before closing airbox.'],'Replace cabin filter':['Replace pollen filter and confirm airflow direction.','Clean debris from housing if present.'],'Replace spark plugs if due':['Remove ignition leads/coils carefully.','Inspect for oil contamination, corrosion or cracking.','Fit correct plugs and avoid cross-threading.'],'Refill oil and leak check':['Refit drain plug with correct seal.','Refill oil to correct level.','Start engine and check oil pressure light and leaks.'],'Road test and service record':['Road test, recheck oil level, and save Vehicle Passport entry.']},auxbelt:{'Prepare access and belt tool':['Raise vehicle safely if needed.','Remove wheel arch liner/access panels where required.','Have MINI serpentine belt tool ready.'],'Record belt routing':['Photograph or sketch belt routing before removal.','Check whether existing routing matches expected layout.'],'Release tensioner with MINI belt tool':['Fit MINI belt tool securely to the tensioner.','Release belt tension gradually and safely.'],'Remove serpentine belt':['Slip belt off pulleys without forcing it.','Inspect old belt for cracking, glazing, oil contamination or missing ribs.'],'Inspect tensioner, idlers and pulleys':['Spin accessible pulleys by hand.','Check tensioner movement, noise, wobble and pulley alignment.','Inspect crank pulley for rubber separation.'],'Fit new belt and confirm routing':['Route belt correctly around every pulley.','Release tensioner slowly and verify full seating in all grooves.'],'Start engine and observe belt tracking':['Start briefly and watch belt tracking.','Stop immediately if belt wanders, squeals or jumps.']}};return (d[id]&&d[id][n])||['Review the current stage.','Work methodically and avoid unnecessary dismantling.','Record notes where there are variant differences or faults found.']}let st=JSON.parse(localStorage.projectPistonV13||localStorage.projectPistonV12||'{}');st.v=st.v||'r52-cooper-s';st.m=st.m||'standard';st.done=st.done||{};st.pass=st.pass||[];st.feedback=st.feedback||[];st.evidence=st.evidence||{};st.current=st.current||0;st.tools=st.tools||{};st.parent=null;veh.innerHTML=vehicles.map(v=>`<option value='${v[0]}'>${v[1]} · ${v[2]} · ${v[3]} · ${v[4]}</option>`).join('');function V(){return vehicles.find(v=>v[0]==st.v)||vehicles[3]}function A(){return mods.filter(m=>!m[3]||V()[5])}function M(){return A().find(m=>m[0]==st.m)||A()[0]}function Info(){return moduleInfo[st.m]||{pack:['Parts to be confirmed'],tools:['torque'],opp:[],validation:['Workshop validation required.']}}function Stages(){return makeStages(st.m)}function save(){localStorage.projectPistonV13=JSON.stringify(st);render()}veh.onchange=()=>{st.v=veh.value;if(!A().some(m=>m[0]==st.m))st.m=A()[0][0];st.current=0;save()};mod.onchange=()=>{st.m=mod.value;st.current=0;st.parent=null;save()};function k(i){return st.m+'-'+i}function done(){return Stages().filter((_,i)=>st.done[k(i)]).length}function evkey(i,t){return k(i)+'-'+t}function ev(i,t){return st.evidence[evkey(i,t)]||0}function capture(i,t){st.evidence[evkey(i,t)]=(st.evidence[evkey(i,t)]||0)+1;st.pass.push({d:new Date().toLocaleDateString(),job:M()[1],step:Stages()[i].name,type:'Evidence '+t,car:V()[1]});save()}function req(i){return Stages()[i].evidence.filter(x=>x!='extra'&&x!='linked-before')}function verified(i){return req(i).every(t=>ev(i,t)>0)}function list(a){return '<ul class="instruction-list">'+a.map(x=>`<li>${x}</li>`).join('')+'</ul>'}function openSubJob(id){st.parent={m:st.m,current:st.current,name:M()[1]};st.m=id;st.current=0;st.pass.push({d:new Date().toLocaleDateString(),job:M()[1],step:'Opened from Whilst You\'re There',type:'Sub-job opened',car:V()[1]});save();document.querySelector('[data-t="garage"]').click()}function returnParent(){if(st.parent){let p=st.parent;st.m=p.m;st.current=p.current;st.parent=null;save();document.querySelector('[data-t="garage"]').click()}}function evidenceActions(i){let e=Stages()[i].evidence;if(!e.length)return '<p class="muted small">No photo evidence required for this stage.</p>';let out='';if(e.includes('linked-before'))out+=`<div class='part linked'><b>Before image linked</b><p class='small'>Uses previous access after-photo.</p></div>`;['before','during','after'].forEach(t=>{if(e.includes(t))out+=`<button onclick="capture(${i},'${t}')">${t[0].toUpperCase()+t.slice(1)} photo (${ev(i,t)})</button>`});if(e.includes('extra'))out+=`<button class='primary' onclick="capture(${i},'extra')">Add picture (${ev(i,'extra')})</button>`;return `<div class='evidence-actions'>${out}</div>`}function need(){let r=0,h=0;Stages().forEach((s,i)=>req(i).forEach(t=>{r++;if(ev(i,t)>0)h++}));return{r,h,p:r?Math.round(h/r*100):100}}function nextStage(){st.current=Math.min(Stages().length-1,st.current+1);save()}function prevStage(){st.current=Math.max(0,st.current-1);save()}function mark(i){st.done[k(i)]=!st.done[k(i)];if(st.done[k(i)])st.pass.push({d:new Date().toLocaleDateString(),job:M()[1],step:Stages()[i].name,type:'Step completed',car:V()[1]});save()}function toolOwned(id){return !!st.tools[id]}function toggleTool(id){st.tools[id]=!st.tools[id];save()}function readiness(){let ids=Object.keys(tools), have=ids.filter(toolOwned).length;return Math.round(have/ids.length*100)}function stageCard(s,i){return `<section class='stage-card'><div class='stage-title'><div><h3>${i+1}. ${s.name}</h3><p class='muted'>${s.reason}</p></div><span class='pill ${i==st.current?'warn':(req(i).length?(verified(i)?'ok':'warn'):'ok')}'>${i==st.current?'Current':(req(i).length?(verified(i)?'Evidence complete':'Evidence needed'):'No evidence required')}</span></div><div class='stage-layout'><div class='instruction-box'><h4>Instructions</h4>${list(s.instructions)}<h4>Parts likely to remove</h4>${list(s.remove)}<h4>Tools / checks</h4>${list(s.tools)}<h4>Why this matters</h4><p>${s.why}</p><textarea placeholder='Technician notes, faults found, variant differences, follow-up reminders...'></textarea></div><aside class='evidence-box'><h4>Evidence</h4>${evidenceActions(i)}<hr><h4>Torque</h4><p class='small muted'>${s.torque}</p><hr><button onclick="mark(${i})">${st.done[k(i)]?'Mark stage undone':'Mark stage done'}</button></aside></div></section>`}function timeline(){return `<div class='timeline'>${Stages().map((s,i)=>`<div class='dot ${st.done[k(i)]?'done':''} ${i==st.current?'current':''}' onclick='st.current=${i};save()'><b>${i+1}. ${s.name.split('/')[0]}</b><p class='small muted'>${st.done[k(i)]?'Complete':(i==st.current?'Current':'Pending')}</p></div>`).join('')}</div>`}function whilstPanel(){let items=Info().opp||[];if(!items.length)return '<p class="muted">No linked sub-jobs set for this module yet.</p>';return items.map(w=>`<button class='wy-btn' onclick="openSubJob('${w[0]}')"><b>${w[1]}</b><p class='muted small'>${w[2]} · opens linked job and returns here when complete</p></button>`).join('')}function toolList(ids){return ids.map(id=>`<div class='part ${toolOwned(id)?'tool-owned':'tool-missing'}'><b>${tools[id].name}</b><p class='muted small'>${tools[id].type} · ${tools[id].price}</p><button onclick="toggleTool('${id}')">${toolOwned(id)?'Owned ✓':'Mark owned'}</button></div>`).join('')}function render(){veh.value=st.v;vehInfo.textContent=`${V()[2]} · ${V()[3]} · ${V()[4]}`;mod.innerHTML=A().map(m=>`<option value='${m[0]}'>${m[1]}</option>`).join('');mod.value=st.m;modInfo.textContent=M()[2];let p=Math.round(done()/Stages().length*100);pct.textContent=p+'%';bar.style.width=p+'%';let en=need();let returnbar=st.parent?`<div class='returnbar'><b>Linked sub-job from ${st.parent.name}</b><p>Complete this task, then return to the parent job.</p><button onclick='returnParent()'>Return without completing</button></div>`:'';home.innerHTML=`<h2>Sprint 3 Dashboard</h2><div class='grid'><div><h3>${V()[1]}</h3><p>${V()[3]} · ${V()[4]}</p></div><div><h3>${M()[1]}</h3><p>${done()} of ${Stages().length} stages complete.</p></div><div><h3>Workshop Readiness</h3><p>${readiness()}% tool profile complete.</p></div></div><div class='notice'>Added fuller Annual Service and Auxiliary Belt content, tool records, Job Pack, validation queue and Workshop Builder.</div>`;garage.innerHTML=`<h2>Garage Mode 2.0</h2>${returnbar}<div class='side-panels'><div class='panel'><h3>Job Pack</h3>${list(Info().pack)}</div><div class='panel'><h3>Required Tools</h3>${toolList(Info().tools)}</div><div class='panel'><h3>Validation Flags</h3>${list(Info().validation)}</div></div>${timeline()}<p><button onclick='prevStage()'>Back</button> <button class='primary' onclick='nextStage()'>Next</button></p>${stageCard(Stages()[st.current],st.current)}<div class='side-panels'><div class='panel'><h3>Whilst You’re There</h3>${whilstPanel()}</div><div class='panel'><h3>Evidence</h3><p>${en.h} / ${en.r} required evidence points captured.</p></div><div class='panel'><h3>Voice Commands</h3><span class='pill'>Next</span><span class='pill'>Repeat</span><span class='pill'>Torque</span><span class='pill'>Photo</span><span class='pill'>Note</span></div></div>`;builder.innerHTML=`<h2>Workshop Builder</h2><p class='muted'>Mark tools you own. The app will eventually use this to show which repairs you can tackle and which tool unlocks the most jobs.</p><h3>Readiness: ${readiness()}%</h3><div class='progress'><span style='width:${readiness()}%'></span></div><div class='grid'>${Object.keys(tools).map(id=>`<div class='part tool-card ${toolOwned(id)?'tool-owned':'tool-missing'}'><h3>${tools[id].name}</h3><p>${tools[id].type}</p><p><b>Typical price:</b> ${tools[id].price}</p><p><b>Repairs unlocked:</b> ${tools[id].unlocks.join(', ')}</p><button onclick="toggleTool('${id}')">${toolOwned(id)?'Owned ✓':'Mark owned'}</button><div class='three'><button>Budget</button><button>Recommended</button><button>Premium</button></div></div>`).join('')}</div>`;voice.innerHTML=`<h2>Workshop Voice</h2><div class='voice'><h3>Hands-free workflow</h3><span class='cmd'>Next</span><span class='cmd'>Back</span><span class='cmd'>Repeat</span><span class='cmd'>Torque</span><span class='cmd'>Tools</span><span class='cmd'>Parts</span><span class='cmd'>Take photo</span><span class='cmd'>Add note</span><span class='cmd'>Finished</span></div>`;evidence.innerHTML=`<h2>Pragmatic Evidence Protocol</h2><div class='job'><b>Prepare tools/workspace</b><p>No photos required.</p></div><div class='job'><b>Gain access</b><p>Before + after only. The after image becomes the repair before-image.</p></div><div class='job'><b>Carry out service/repair</b><p>Linked before + after. Optional extras only when useful.</p></div><div class='job'><b>Inspect related components</b><p>During photo per extra part inspected. Use Add picture for each item.</p></div>`;parts.innerHTML=`<h2>Curated Parts</h2><p>No pop-ups. Three clear choices only.</p><div class='three'><div class='part'><h3>Budget</h3><p>Approved low-cost option.</p></div><div class='part'><h3>Recommended</h3><p>Best value for most repairs.</p></div><div class='part'><h3>Premium</h3><p>OEM or premium aftermarket; sponsored only if quality criteria are met.</p></div></div>`;feedback.innerHTML=`<h2>Suggest Update</h2><select id='fbtype'><option>Improve this job</option><option>Suggest a new job</option><option>Suggest a change with reason</option><option>Report conflict / variant difference</option><option>Other</option></select><textarea id='fbtext' placeholder='What should change and why?'></textarea><button onclick="st.feedback.push({type:fbtype.value,text:fbtext.value,module:M()[1],vehicle:V()[1],date:new Date().toLocaleDateString()});fbtext.value='';save()">Save suggestion</button><h3>Saved suggestions</h3>${st.feedback.length?st.feedback.slice().reverse().map(f=>`<div class='job'><b>${f.type}</b><p>${f.text}</p><p class='muted'>${f.module} · ${f.vehicle} · ${f.date}</p></div>`).join(''):'<p>No suggestions yet.</p>'}`;passport.innerHTML=`<h2>Vehicle Passport</h2>${st.pass.length?st.pass.slice().reverse().map(p=>`<div class='job'><b>${p.step}</b><p class='muted'>${p.d} · ${p.type} · ${p.job} · ${p.car}</p></div>`).join(''):'<p>No entries yet.</p>'}`}document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');['home','garage','builder','voice','evidence','parts','feedback','passport'].forEach(id=>document.getElementById(id).classList.add('hidden'));document.getElementById(b.dataset.t).classList.remove('hidden')});render();</script></body></html>
